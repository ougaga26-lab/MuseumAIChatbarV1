<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>臺史博 AI 助理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400&display=swap');

:root {
  --bg-top: #0a0a1a;
  --bg-bot: #0d0d1f;
  --blob1: #6366f1;
  --blob2: #8b5cf6;
  --blob3: #a78bfa;
  --blob4: #c4b5fd;
  --text: #f0eeff;
  --text-dim: rgba(240,238,255,0.45);
  --drawer-bg: rgba(10,10,28,0.92);
  --drawer-border: rgba(139,92,246,0.2);
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.08);
  --accent: #a78bfa;
  --accent-glow: rgba(167,139,250,0.3);
  --user-bubble: rgba(99,102,241,0.2);
  --user-border: rgba(99,102,241,0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; height: 100dvh;
  background: var(--bg-top);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 300;
  overflow: hidden;
  user-select: none;
}

/* ── Background ───────────────────────────────────────── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.18) 0%, transparent 60%),
              radial-gradient(ellipse at 75% 70%, rgba(139,92,246,0.15) 0%, transparent 55%),
              linear-gradient(160deg, #0a0a1e 0%, #0d0818 100%);
}

/* ── App shell ────────────────────────────────────────── */
.app {
  position: relative; z-index: 1;
  height: 100%; height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center;
}

/* ── Header ───────────────────────────────────────────── */
.header {
  width: 100%; padding: 18px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-logo {
  display: flex; align-items: center; gap: 9px;
}
.logo-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--blob1), var(--blob2));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif TC', serif;
  font-size: 13px; color: #fff; font-weight: 600;
}
.logo-text {
  font-size: 13px; font-weight: 400;
  color: var(--text-dim); letter-spacing: 0.06em;
}
.status-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface);
  border: 1px solid var(--drawer-border);
  border-radius: 20px; padding: 5px 10px;
  font-size: 10px; color: var(--text-dim);
  backdrop-filter: blur(10px);
}
.status-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px rgba(74,222,128,0.8);
  animation: statusPulse 2.5s ease-in-out infinite;
}
@keyframes statusPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Greeting ─────────────────────────────────────────── */
.greeting {
  margin-top: 32px;
  text-align: center;
  flex-shrink: 0;
}
.greeting h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px; font-weight: 600;
  letter-spacing: 0.04em; line-height: 1.4;
}
.greeting p {
  font-size: 12px; color: var(--text-dim);
  margin-top: 6px; letter-spacing: 0.05em;
}

/* ── Blob stage ───────────────────────────────────────── */
.blob-stage {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  width: 100%;
  position: relative;
}

/* Outer glow ring */
.blob-glow {
  position: absolute;
  width: 260px; height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
  animation: glowPulse 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes glowPulse {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.15); opacity: 1; }
}

/* Main blob SVG wrapper */
.blob-wrap {
  position: relative;
  width: 200px; height: 200px;
  cursor: pointer;
  transition: transform 0.3s ease;
}
.blob-wrap:active { transform: scale(0.96); }

.blob-svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 30px rgba(139,92,246,0.5));
  overflow: visible;
}

/* Blob eyes */
.blob-eyes {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -54%);
  display: flex; gap: 18px; align-items: center;
  pointer-events: none;
}
.eye {
  width: 10px; height: 13px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  transition: all 0.3s ease;
  position: relative;
  animation: eyeBlink 6s ease-in-out infinite;
}
.eye::after {
  content: '';
  position: absolute;
  bottom: 2px; right: 2px;
  width: 3px; height: 3px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
}
@keyframes eyeBlink {
  0%,93%,97%,100% { transform: scaleY(1); }
  95% { transform: scaleY(0.05); }
}

/* ── Blob states ──────────────────────────────────────── */
/* Idle: slow float + look-around */
.blob-wrap.idle .blob-path {
  animation: blobIdle 4s ease-in-out infinite, blobLook 8s ease-in-out infinite;
}
/* Listening: pulse big */
.blob-wrap.listening .blob-path {
  animation: blobListen 0.6s ease-in-out infinite alternate;
}
.blob-wrap.listening { filter: drop-shadow(0 0 40px rgba(99,102,241,0.8)); }
/* Speaking: fast wobble */
.blob-wrap.speaking .blob-path {
  animation: blobSpeak 0.3s ease-in-out infinite alternate;
}

@keyframes blobIdle {
  0%,100% { transform: translateY(0) scale(1,1); }
  25% { transform: translateY(-8px) scale(1.02, 0.98); }
  50% { transform: translateY(-4px) scale(0.98, 1.02); }
  75% { transform: translateY(-10px) scale(1.01, 0.99); }
}
@keyframes blobLook {
  0%,20% { transform: translateX(0); }
  30%,45% { transform: translateX(-14px); }
  55%,70% { transform: translateX(14px); }
  80%,100% { transform: translateX(0); }
}
@keyframes blobListen {
  from { transform: scale(1); filter: brightness(1); }
  to   { transform: scale(1.08); filter: brightness(1.2); }
}
@keyframes blobSpeak {
  from { transform: scale(1, 1) rotate(-1deg); }
  to   { transform: scale(1.04, 0.97) rotate(1deg); }
}

/* Eye reactions */
.blob-wrap.listening .eye { height: 14px; width: 12px; }
.blob-wrap.speaking .eye {
  height: 8px; border-radius: 40%;
  animation: eyeTalk 0.3s ease-in-out infinite alternate;
}
@keyframes eyeTalk { from { height: 10px; } to { height: 5px; } }

/* Mic tap hint */
.mic-hint {
  position: absolute;
  bottom: -36px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: var(--text-dim);
  white-space: nowrap; letter-spacing: 0.06em;
  animation: hintFade 3s ease-in-out infinite;
}
@keyframes hintFade { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

/* Voice status ring */
.voice-ring {
  position: absolute;
  width: 220px; height: 220px;
  border-radius: 50%;
  border: 1.5px solid transparent;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.voice-ring.active {
  opacity: 1;
  border-color: rgba(167,139,250,0.5);
  animation: ringPulse 1s ease-in-out infinite;
}
@keyframes ringPulse {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.08); opacity: 1; }
}

/* ── Bottom bar ───────────────────────────────────────── */
.bottom-bar {
  width: 100%; padding: 16px 24px;
  display: flex; align-items: center; justify-content: center;
  gap: 20px;
  flex-shrink: 0;
  position: relative;
  z-index: 5;
}

@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-bar { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
}

/* Chat tab button */
.chat-tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer;
  padding: 8px 12px; border-radius: 12px;
  transition: background 0.2s;
  color: var(--text-dim);
}
.chat-tab-btn:active { background: var(--surface); }
.chat-tab-btn svg { width: 22px; height: 22px; }
.chat-tab-btn span { font-size: 10px; letter-spacing: 0.05em; }
.chat-tab-btn.has-messages .tab-icon-wrap {
  position: relative;
}
.chat-tab-btn.has-messages::after {
  content: '';
  position: absolute;
  top: 6px; right: 10px;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--accent-glow);
}

/* ── Drawer ───────────────────────────────────────────── */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 8;
  background: rgba(0,0,0,0.3);
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
  backdrop-filter: blur(2px);
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 9;
  height: 64%;
  background: var(--drawer-bg);
  border-top: 1px solid var(--drawer-border);
  border-radius: 22px 22px 0 0;
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  will-change: transform;
}
.drawer.open { transform: translateY(0); }

/* Drawer handle */
.drawer-handle {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
  cursor: pointer;
}

/* Drawer header */
.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px 8px;
  flex-shrink: 0;
}
.drawer-title {
  font-size: 13px; color: var(--text-dim);
  letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 6px;
}
.drawer-title svg { width: 13px; height: 13px; opacity: 0.6; }
.drawer-close-btn {
  background: var(--surface); border: none; cursor: pointer;
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); transition: background 0.2s;
}
.drawer-close-btn:active { background: var(--surface2); }
.drawer-close-btn svg { width: 14px; height: 14px; }

/* Chat messages */
.chat-area {
  flex: 1; overflow-y: auto;
  padding: 8px 16px 12px;
  display: flex; flex-direction: column; gap: 14px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.chat-area::-webkit-scrollbar { width: 0; }

/* Empty state */
.chat-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 20px;
  opacity: 0; animation: fadeIn 0.4s 0.2s ease forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
.chat-empty p { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.8; }

/* Suggestions */
.suggestion-chips {
  display: flex; flex-wrap: wrap; gap: 7px;
  padding: 0 16px 10px;
  flex-shrink: 0;
}
.chip-btn {
  background: var(--surface); border: 1px solid var(--drawer-border);
  color: var(--text-dim); font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; padding: 6px 12px; border-radius: 20px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  -webkit-appearance: none;
}
.chip-btn:active { border-color: var(--accent); color: var(--accent); background: rgba(167,139,250,0.1); }

/* Messages */
.msg { display: flex; gap: 8px; animation: msgIn 0.25s ease; }
.msg.user { flex-direction: row-reverse; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.avatar {
  width: 26px; height: 26px; border-radius: 8px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; margin-top: 2px;
}
.avatar.bot {
  background: linear-gradient(135deg, var(--blob1), var(--blob2));
  color: #fff; font-family: 'Noto Serif TC', serif;
}
.avatar.user { background: var(--surface2); color: var(--text-dim); }

.bubble {
  max-width: calc(100% - 72px);
  padding: 10px 13px; font-size: 13.5px; line-height: 1.8;
  border-radius: 14px; word-break: break-word;
}
.bubble.bot {
  background: var(--surface); border: 1px solid var(--drawer-border);
  color: var(--text); border-top-left-radius: 3px;
}
.bubble.user {
  background: var(--user-bubble); border: 1px solid var(--user-border);
  color: var(--text); border-top-right-radius: 3px;
}
.bubble.error {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
  color: #fca5a5;
}

/* Typing dots */
.typing { display: flex; gap: 8px; align-items: flex-end; }
.typing-dots {
  background: var(--surface); border: 1px solid var(--drawer-border);
  border-top-left-radius: 3px; border-radius: 14px;
  padding: 12px 16px; display: flex; gap: 4px; align-items: center;
}
.typing-dots span {
  width: 5px; height: 5px; background: var(--text-dim);
  border-radius: 50%; animation: tdBounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdBounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ── Drawer Input ─────────────────────────────────────── */
.drawer-input-area {
  padding: 10px 14px 14px;
  border-top: 1px solid var(--drawer-border);
  flex-shrink: 0;
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .drawer-input-area { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
}
.drawer-input-wrap {
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--surface); border: 1px solid var(--drawer-border);
  border-radius: 14px; padding: 9px 12px;
  transition: border-color 0.2s;
}
.drawer-input-wrap:focus-within { border-color: rgba(167,139,250,0.5); }
textarea {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px; font-weight: 300; resize: none;
  line-height: 1.6; max-height: 80px; min-height: 22px; padding: 0;
}
textarea::placeholder { color: var(--text-dim); }
.send-btn {
  width: 34px; height: 34px; background: linear-gradient(135deg, var(--blob1), var(--blob2));
  border: none; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity 0.2s; -webkit-appearance: none;
}
.send-btn:active { opacity: 0.8; }
.send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.send-btn svg { width: 14px; height: 14px; fill: #fff; }

/* ── Voice status label ───────────────────────────────── */
.voice-label {
  position: absolute;
  bottom: calc(100% + 14px);
  left: 50%; transform: translateX(-50%);
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.08em;
  white-space: nowrap;
  transition: opacity 0.3s;
  pointer-events: none;
}

/* ── Tablet / Desktop ─────────────────────────────────── */
@media (min-width: 600px) {
  .greeting h2 { font-size: 26px; }
  .blob-wrap { width: 240px; height: 240px; }
  .blob-glow { width: 320px; height: 320px; }
  .drawer { max-width: 480px; left: 50%; transform: translateX(-50%) translateY(100%); border-radius: 22px 22px 0 0; }
  .drawer.open { transform: translateX(-50%) translateY(0); }
  .drawer-overlay { display: none; }
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <div class="logo-mark">史</div>
      <span class="logo-text">臺史博 AI 助理</span>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>線上服務中</span>
    </div>
  </div>

  <!-- Greeting -->
  <div class="greeting" id="greeting">
    <h2 id="greetingText">你好，我是臺史博助理</h2>
    <p id="greetingSubtext">點我說話，或向上滑動查看對話</p>
  </div>

  <!-- Blob stage -->
  <div class="blob-stage">
    <div class="blob-glow"></div>
    <div class="voice-ring" id="voiceRing"></div>

    <div class="blob-wrap idle" id="blobWrap" onclick="toggleRecording()">
      <svg class="blob-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="blobGrad" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="40%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#4f46e5"/>
          </radialGradient>
          <radialGradient id="blobShine" cx="30%" cy="25%" r="40%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <filter id="blobBlur">
            <feGaussianBlur stdDeviation="0.5"/>
          </filter>
        </defs>
        <!-- Main blob shape -->
        <path class="blob-path" id="blobPath"
          d="M 100 20
             C 130 18, 160 35, 172 60
             C 184 85, 182 115, 168 138
             C 154 161, 130 178, 100 180
             C 70 178, 46 161, 32 138
             C 18 115, 16 85, 28 60
             C 40 35, 70 22, 100 20 Z"
          fill="url(#blobGrad)" filter="url(#blobBlur)"/>
        <!-- Shine overlay -->
        <path
          d="M 100 20
             C 130 18, 160 35, 172 60
             C 184 85, 182 115, 168 138
             C 154 161, 130 178, 100 180
             C 70 178, 46 161, 32 138
             C 18 115, 16 85, 28 60
             C 40 35, 70 22, 100 20 Z"
          fill="url(#blobShine)" opacity="0.7"/>
      </svg>
      <!-- Eyes -->
      <div class="blob-eyes">
        <div class="eye" id="eyeL"></div>
        <div class="eye" id="eyeR"></div>
      </div>
      <!-- Mic hint -->
      <div class="mic-hint" id="micHint">點我說話</div>
    </div>

    <!-- Voice label -->
    <div class="voice-label" id="voiceLabel"></div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="chat-tab-btn" id="chatTabBtn" onclick="openDrawer()">
      <div class="tab-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span>對話記錄</span>
    </button>
  </div>

</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-header">
    <div class="drawer-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      對話記錄
    </div>
    <button class="drawer-close-btn" onclick="closeDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Suggestion chips (hidden after first message) -->
  <div class="suggestion-chips" id="suggestionChips">
    <button class="chip-btn" onclick="askChip(this)">幾點開館？</button>
    <button class="chip-btn" onclick="askChip(this)">票價多少？</button>
    <button class="chip-btn" onclick="askChip(this)">現在有哪些特展？</button>
    <button class="chip-btn" onclick="askChip(this)">怎麼搭公車來？</button>
    <button class="chip-btn" onclick="askChip(this)">可以帶寵物嗎？</button>
    <button class="chip-btn" onclick="askChip(this)">停車多少錢？</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="chat-empty" id="chatEmpty">
      <p>點下方麥克風說話<br>或輸入問題開始對話</p>
    </div>
  </div>

  <div class="drawer-input-area">
    <div class="drawer-input-wrap">
      <textarea id="userInput" placeholder="輸入問題…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────
const WORKER = 'https://nmth-api-proxy.ougaga26.workers.dev';

// ── Knowledge Base ──────────────────────────────────────────────

const KB_TEXT = KB.map(e => `【${e.category}】${e.q}\n${e.a}`).join('\n\n');
const SYSTEM_PROMPT = `你是國立臺灣歷史博物館（臺史博）的 AI 問答助理。
【規則】只能根據以下知識庫回答。找不到答案請說「我目前的資料沒有這個資訊，建議聯繫館方：06-356-8889」。問題模糊請主動反問。有對話記憶，請根據上下文理解真實意圖。語氣親切簡潔，使用繁體中文。回答請盡量簡短，2-4句為佳。
【知識庫】\n${KB_TEXT}`;

// ── State ──────────────────────────────────────────────────────
let conversationHistory = [];
let isLoading = false;
let isRecording = false;
let mediaRecorder = null;
let currentAudio = null;
let hasMessages = false;

// ── DOM refs ───────────────────────────────────────────────────
const blob = document.getElementById('blobWrap');
const voiceRing = document.getElementById('voiceRing');
const voiceLabel = document.getElementById('voiceLabel');
const micHint = document.getElementById('micHint');
const greetingText = document.getElementById('greetingText');
const greetingSubtext = document.getElementById('greetingSubtext');
const chatArea = document.getElementById('chatArea');
const chatEmpty = document.getElementById('chatEmpty');
const sendBtn = document.getElementById('sendBtn');
const userInput = document.getElementById('userInput');
const chatTabBtn = document.getElementById('chatTabBtn');
const suggestionChips = document.getElementById('suggestionChips');

// ── Blob state ─────────────────────────────────────────────────
function setBlobState(state) {
  blob.className = 'blob-wrap ' + state;
  voiceRing.className = 'voice-ring' + (state !== 'idle' ? ' active' : '');
}

function setVoiceLabel(text) {
  voiceLabel.textContent = text;
  voiceLabel.style.opacity = text ? '1' : '0';
}

// ── Drawer ─────────────────────────────────────────────────────
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 100);
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

// Swipe to close drawer
let touchStartY = 0;
document.getElementById('drawer').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('drawer').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 60) closeDrawer();
}, { passive: true });

// ── Chat helpers ───────────────────────────────────────────────
function appendMsg(text, role, isError = false) {
  if (chatEmpty) chatEmpty.remove();
  if (!hasMessages && role === 'user') {
    hasMessages = true;
    chatTabBtn.classList.add('has-messages');
    suggestionChips.style.display = 'none';
  }
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'bot' ? '史' : '我';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}${isError ? ' error' : ''}`;
  bubble.style.whiteSpace = 'pre-line';
  bubble.textContent = text;
  div.appendChild(av); div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typingIndicator';
  const av = document.createElement('div');
  av.className = 'avatar bot'; av.textContent = '史';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  div.appendChild(av); div.appendChild(dots);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function hideTyping() { document.getElementById('typingIndicator')?.remove(); }

// ── Gemini ─────────────────────────────────────────────────────
async function callGemini(userMessage) {
  conversationHistory.push({ role: 'user', parts: [{ text: userMessage }] });
  const res = await fetch(`${WORKER}/gemini`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: conversationHistory,
      generationConfig: { maxOutputTokens: 600, temperature: 0.3 }
    })
  });
  if (!res.ok) throw new Error(`${res.status}`);
  const data = await res.json();
  const reply = data.candidates[0].content.parts[0].text;
  conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
  return reply;
}

// ── TTS ────────────────────────────────────────────────────────
async function speakText(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  setBlobState('speaking');
  setVoiceLabel('說話中…');
  try {
    const res = await fetch(`${WORKER}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error('TTS failed');
    const blob_ = await res.blob();
    const url = URL.createObjectURL(blob_);
    currentAudio = new Audio(url);
    currentAudio.onended = () => { setBlobState('idle'); setVoiceLabel(''); };
    currentAudio.onerror = () => { setBlobState('idle'); setVoiceLabel(''); };
    await currentAudio.play();
  } catch (e) {
    setBlobState('idle'); setVoiceLabel('');
  }
}

// ── STT ────────────────────────────────────────────────────────
async function toggleRecording() {
  if (isLoading) return;
  if (isRecording) {
    mediaRecorder?.state === 'recording' && mediaRecorder.stop();
    return;
  }
  isRecording = true;
  setBlobState('listening');
  setVoiceLabel('聆聽中… 再點停止');
  micHint.style.display = 'none';
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const chunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      isRecording = false;
      setBlobState('idle');
      setVoiceLabel('辨識中…');
      try {
        const webmBlob = new Blob(chunks, { type: 'audio/webm' });
        const wavBlob = await convertToWav(webmBlob);
        const res = await fetch(`${WORKER}/stt`, {
          method: 'POST',
          headers: { 'Content-Type': 'audio/wav' },
          body: wavBlob
        });
        const data = await res.json();
        const text = data.DisplayText || '';
        setVoiceLabel('');
        if (text) {
          openDrawer();
          await new Promise(r => setTimeout(r, 200));
          sendMessage(text);
        } else {
          setVoiceLabel('未偵測到語音');
          setTimeout(() => setVoiceLabel(''), 2000);
        }
      } catch {
        setVoiceLabel('辨識失敗，請再試');
        setTimeout(() => setVoiceLabel(''), 2500);
      }
    };
    mediaRecorder.start();
    setTimeout(() => mediaRecorder?.state === 'recording' && mediaRecorder.stop(), 10000);
  } catch {
    isRecording = false;
    setBlobState('idle');
    setVoiceLabel('無法存取麥克風');
    setTimeout(() => setVoiceLabel(''), 2500);
    micHint.style.display = '';
  }
}

// ── WAV ────────────────────────────────────────────────────────
async function convertToWav(blob_) {
  const ctx = new AudioContext({ sampleRate: 16000 });
  const buf = await blob_.arrayBuffer();
  const audio = await ctx.decodeAudioData(buf);
  const pcm = audio.getChannelData(0);
  return new Blob([pcmToWav(pcm, 16000)], { type: 'audio/wav' });
}
function pcmToWav(pcm, sr) {
  const buf = new ArrayBuffer(44 + pcm.length * 2);
  const v = new DataView(buf);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4, 36 + pcm.length * 2, true);
  ws(8,'WAVE'); ws(12,'fmt '); v.setUint32(16,16,true);
  v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40, pcm.length * 2, true);
  for (let i = 0; i < pcm.length; i++)
    v.setInt16(44 + i * 2, Math.max(-1, Math.min(1, pcm[i])) * 0x7FFF, true);
  return buf;
}

// ── Send ───────────────────────────────────────────────────────
async function sendMessage(text) {
  const q = text || userInput.value.trim();
  if (!q || isLoading) return;
  appendMsg(q, 'user');
  userInput.value = ''; autoResize(userInput);
  isLoading = true; sendBtn.disabled = true;
  showTyping();
  greetingText.textContent = '思考中…';
  greetingSubtext.textContent = '';

  try {
    const reply = await callGemini(q);
    hideTyping();
    appendMsg(reply, 'bot');
    greetingText.textContent = '回答完成';
    greetingSubtext.textContent = '點我繼續說話';
    speakText(reply);
  } catch (err) {
    hideTyping();
    appendMsg('連線失敗，請稍後再試，或洽服務台 06-356-8889。', 'bot', true);
    conversationHistory.pop();
    greetingText.textContent = '你好，我是臺史博助理';
    greetingSubtext.textContent = '點我說話，或向上滑動查看對話';
    setBlobState('idle');
  }
  isLoading = false; sendBtn.disabled = false;
}

function askChip(btn) { openDrawer(); setTimeout(() => sendMessage(btn.textContent), 150); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }
</script>

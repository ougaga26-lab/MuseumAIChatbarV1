<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>臺史博 AI 助理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400&display=swap');

:root {
  --bg: #0d0d1a;
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.08);
  --border: rgba(139,92,246,0.2);
  --accent: #a78bfa;
  --text: #f0eeff;
  --text-dim: rgba(240,238,255,0.45);
  --text-dimmer: rgba(240,238,255,0.25);
  --user-bubble: rgba(99,102,241,0.2);
  --user-border: rgba(99,102,241,0.35);
  --drawer-bg: rgba(8,8,20,0.93);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 300;
  overflow: hidden;
  user-select: none;
}

/* ── Canvas (Three.js) ───────────────────────────── */
#threeCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  cursor: pointer;
}

/* ── App overlay ─────────────────────────────────── */
.app {
  position: relative; z-index: 1;
  height: 100%; height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center;
  pointer-events: none;
}
.app > * { pointer-events: all; }

/* ── Header ──────────────────────────────────────── */
.header {
  width: 100%; padding: 20px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.header-logo { display: flex; align-items: center; gap: 9px; }
.logo-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif TC', serif;
  font-size: 13px; color: #fff; font-weight: 600;
}
.logo-text { font-size: 13px; color: var(--text-dim); letter-spacing: 0.06em; }
.status-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 10px;
  font-size: 10px; color: var(--text-dim);
  backdrop-filter: blur(10px);
}
.status-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px rgba(74,222,128,0.8);
  animation: sPulse 2.5s ease-in-out infinite;
}
@keyframes sPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Greeting ────────────────────────────────────── */
.greeting {
  margin-top: 28px;
  text-align: center;
  pointer-events: none;
}
.greeting h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px; font-weight: 600;
  letter-spacing: 0.04em;
}
.greeting p {
  font-size: 11px; color: var(--text-dim);
  margin-top: 5px; letter-spacing: 0.05em;
}

/* ── Center spacer (canvas takes up most of screen) ── */
.orb-spacer { flex: 1; pointer-events: none; }

/* ── Voice label ─────────────────────────────────── */
.voice-label {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.08em;
  height: 20px;
  transition: opacity 0.3s;
  text-align: center;
  pointer-events: none;
}

/* ── Bottom bar ──────────────────────────────────── */
.bottom-bar {
  width: 100%; padding: 14px 24px 20px;
  display: flex; align-items: center; justify-content: center;
  gap: 20px;
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-bar { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
}

.chat-tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; cursor: pointer;
  padding: 8px 14px; border-radius: 14px;
  color: var(--text-dim);
  transition: background 0.2s;
  position: relative;
}
.chat-tab-btn:active { background: var(--surface); }
.chat-tab-btn svg { width: 22px; height: 22px; }
.chat-tab-btn span { font-size: 10px; letter-spacing: 0.05em; }
.chat-tab-btn.has-messages .notif-dot {
  display: block;
}
.notif-dot {
  display: none;
  position: absolute; top: 6px; right: 12px;
  width: 7px; height: 7px;
  background: var(--accent); border-radius: 50%;
  box-shadow: 0 0 6px rgba(167,139,250,0.6);
}

/* ── Drawer ──────────────────────────────────────── */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 8;
  background: rgba(0,0,0,0.35);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(3px);
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 9;
  height: 64%;
  background: var(--drawer-bg);
  border-top: 1px solid var(--border);
  border-radius: 22px 22px 0 0;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
}
.drawer.open { transform: translateY(0); }

.drawer-handle {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  margin: 12px auto 0;
  cursor: pointer; flex-shrink: 0;
}
.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px 6px; flex-shrink: 0;
}
.drawer-title {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 6px;
}
.drawer-title svg { width: 12px; height: 12px; opacity: 0.5; }
.drawer-close-btn {
  background: var(--surface); border: none; cursor: pointer;
  width: 26px; height: 26px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim);
}
.drawer-close-btn svg { width: 13px; height: 13px; }

.chip-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 0 16px 8px; flex-shrink: 0;
}
.chip-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-dim); font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; padding: 5px 11px; border-radius: 20px;
  cursor: pointer; white-space: nowrap; -webkit-appearance: none;
  transition: all 0.15s;
}
.chip-btn:active { border-color: var(--accent); color: var(--accent); }

.chat-area {
  flex: 1; overflow-y: auto; padding: 6px 16px 10px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
}
.chat-area::-webkit-scrollbar { width: 0; }

.chat-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.chat-empty p { font-size: 12px; color: var(--text-dimmer); text-align: center; line-height: 1.9; }

.msg { display: flex; gap: 8px; animation: msgIn 0.22s ease; }
.msg.user { flex-direction: row-reverse; }
@keyframes msgIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

.avatar {
  width: 24px; height: 24px; border-radius: 7px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500; margin-top: 2px;
}
.avatar.bot { background: linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; font-family:'Noto Serif TC',serif; }
.avatar.user { background: var(--surface2); color: var(--text-dim); }

.bubble {
  max-width: calc(100% - 66px);
  padding: 9px 12px; font-size: 13px; line-height: 1.8;
  border-radius: 14px; word-break: break-word;
}
.bubble.bot { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 3px; }
.bubble.user { background: var(--user-bubble); border: 1px solid var(--user-border); color: var(--text); border-top-right-radius: 3px; }
.bubble.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }

.typing { display: flex; gap: 8px; align-items: flex-end; }
.typing-dots {
  background: var(--surface); border: 1px solid var(--border);
  border-top-left-radius: 3px; border-radius: 14px;
  padding: 11px 14px; display: flex; gap: 4px; align-items: center;
}
.typing-dots span {
  width: 4px; height: 4px; background: var(--text-dim);
  border-radius: 50%; animation: tdB 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes tdB{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}

.drawer-input-area {
  padding: 8px 14px 12px; border-top: 1px solid var(--border); flex-shrink: 0;
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .drawer-input-area { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
}
.drawer-input-wrap {
  display: flex; gap: 7px; align-items: flex-end;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 8px 11px; transition: border-color 0.2s;
}
.drawer-input-wrap:focus-within { border-color: rgba(167,139,250,0.5); }
textarea {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px; font-weight: 300; resize: none;
  line-height: 1.6; max-height: 80px; min-height: 22px; padding: 0;
}
textarea::placeholder { color: var(--text-dimmer); }
.send-btn {
  width: 32px; height: 32px;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  border: none; border-radius: 9px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; -webkit-appearance: none; transition: opacity 0.2s;
}
.send-btn:active { opacity: 0.8; }
.send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.send-btn svg { width: 13px; height: 13px; fill: #fff; }

/* ── Tablet / Desktop ────────────────────────────── */
@media (min-width: 600px) {
  .greeting h2 { font-size: 24px; }
  .drawer { max-width: 480px; left: 50%; transform: translateX(-50%) translateY(100%); }
  .drawer.open { transform: translateX(-50%) translateY(0); }
  .drawer-overlay { display: none; }
}
</style>
</head>
<body>

<!-- Three.js canvas -->
<canvas id="threeCanvas"></canvas>

<div class="app">
  <div class="header">
    <div class="header-logo">
      <div class="logo-mark">史</div>
      <span class="logo-text">臺史博 AI 助理</span>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>線上服務中</span>
    </div>
  </div>

  <div class="greeting">
    <h2 id="greetingText">你好，我是臺史博助理</h2>
    <p id="greetingSubtext">點球球說話，或向上滑動查看對話</p>
  </div>

  <div class="orb-spacer"></div>

  <div class="voice-label" id="voiceLabel"></div>

  <div class="bottom-bar">
    <button class="chat-tab-btn" id="chatTabBtn" onclick="openDrawer()">
      <div class="notif-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>對話記錄</span>
    </button>
  </div>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-header">
    <div class="drawer-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      對話記錄
    </div>
    <button class="drawer-close-btn" onclick="closeDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="chip-row" id="chipRow">
    <button class="chip-btn" onclick="askChip(this)">幾點開館？</button>
    <button class="chip-btn" onclick="askChip(this)">票價多少？</button>
    <button class="chip-btn" onclick="askChip(this)">現在有哪些特展？</button>
    <button class="chip-btn" onclick="askChip(this)">怎麼搭公車來？</button>
    <button class="chip-btn" onclick="askChip(this)">可以帶寵物嗎？</button>
    <button class="chip-btn" onclick="askChip(this)">停車多少錢？</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="chat-empty" id="chatEmpty">
      <p>點球球說話<br>或在下方輸入問題</p>
    </div>
  </div>

  <div class="drawer-input-area">
    <div class="drawer-input-wrap">
      <textarea id="userInput" placeholder="輸入問題…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ═══════════════════════════════════════════════════
// THREE.JS ORB  (from aguscruiz/voiceorb, adapted)
// ═══════════════════════════════════════════════════
let scene, camera, renderer, orbLayers = [];
let currentOrbState = 'idle';
let targetScale = 1.0, currentScale = 1.0;
let speakingCadence = { time:0, intensity:0, nextChange:0 };

const orbStates = {
  idle: {
    layers: [
      { color:0x434FCF, opacity:0.2, scale:1.0,  rotationSpeed:{x:0.001,y:0.002,z:0} },
      { color:0x434FCF, opacity:0.2, scale:0.85, rotationSpeed:{x:-0.002,y:0.003,z:0.001} },
      { color:0x434FCF, opacity:0.4, scale:0.70, rotationSpeed:{x:0.003,y:-0.002,z:-0.001} }
    ],
    audioLevel:0.15, timeSpeed:0.015, pulsate:false, chromaticAberration:0.8
  },
  listening: {
    layers: [
      { color:0x3B82F6, opacity:0.25, scale:1.0,  rotationSpeed:{x:0.002,y:0.004,z:0} },
      { color:0x60A5FA, opacity:0.25, scale:0.85, rotationSpeed:{x:-0.003,y:0.005,z:0.002} },
      { color:0x93C5FD, opacity:0.45, scale:0.70, rotationSpeed:{x:0.004,y:-0.003,z:-0.001} }
    ],
    audioLevel:0.6, timeSpeed:0.022, pulsate:true, pulsateMode:'audio-reactive',
    pulsateMin:0.02, pulsateMax:0.28, chromaticAberration:1.2
  },
  thinking: {
    layers: [
      { color:0x8747F7, opacity:0.2, scale:0.85, rotationSpeed:{x:0.003,y:0.003,z:0} },
      { color:0x9D6BFF, opacity:0.2, scale:0.72, rotationSpeed:{x:-0.004,y:0.004,z:0.002} },
      { color:0xB48AFF, opacity:0.4, scale:0.60, rotationSpeed:{x:0.005,y:-0.004,z:-0.002} }
    ],
    audioLevel:0.45, timeSpeed:0.02, pulsate:true, pulsateMode:'thinking',
    pulsateMin:0.0, pulsateMax:0.15, chromaticAberration:0.8
  },
  speaking: {
    layers: [
      { color:0xFF1893, opacity:0.2, scale:1.0,  rotationSpeed:{x:0.004,y:0.005,z:0} },
      { color:0xFF4DAA, opacity:0.2, scale:0.85, rotationSpeed:{x:-0.005,y:0.006,z:0.003} },
      { color:0xFF80C0, opacity:0.4, scale:0.70, rotationSpeed:{x:0.006,y:-0.005,z:-0.002} }
    ],
    audioLevel:0.8, timeSpeed:0.027, pulsate:true, pulsateMode:'cadence',
    pulsateMin:0.05, pulsateMax:0.25, chromaticAberration:1.5
  }
};

const vertexShader = `
  varying vec3 vNormal; varying vec3 vPosition; varying vec2 vUv;
  uniform float time; uniform float audioLevel; uniform float layerOffset;
  vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
  vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
  vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
  float snoise(vec3 v){
    const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);
    vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
    vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;
    vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
    vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
    i=mod289(i);
    vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
    float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
    vec4 j=p-49.*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);
    vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.-abs(x)-abs(y);
    vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
    vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));
    vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
    vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
    vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
    vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;
    return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }
  void main(){
    vUv=uv;vNormal=normalize(normalMatrix*normal);
    vec3 pos=position;
    float wave1=sin(pos.y*2.5+time*1.5+layerOffset)*cos(pos.x*2.-time*1.2);
    float wave2=sin(pos.x*3.-time*1.8+layerOffset)*cos(pos.z*2.5+time*1.5);
    float wave3=sin(pos.z*2.8+time*1.6+layerOffset)*cos(pos.y*2.3-time*1.3);
    float noise1=snoise(pos*1.2+time*0.3+layerOffset);
    float noise2=snoise(pos*2.-time*0.2+layerOffset*0.5);
    float distortion=(wave1+wave2+wave3)*0.008+(noise1*0.008+noise2*0.007);
    distortion*=(0.3+audioLevel*0.6);
    pos=pos+normal*distortion;
    vPosition=pos;
    gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.);
  }
`;

const fragmentShader = `
  varying vec3 vNormal; varying vec3 vPosition; varying vec2 vUv;
  uniform vec3 sphereColor; uniform float opacity; uniform float time; uniform float chromaticAberration;
  vec3 rgb2hsv(vec3 c){
    vec4 K=vec4(0.,-1./3.,2./3.,-1.);
    vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g));
    vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r));
    float d=q.x-min(q.w,q.y);float e=1.e-10;
    return vec3(abs(q.z+(q.w-q.y)/(6.*d+e)),d/(q.x+e),q.x);
  }
  vec3 hsv2rgb(vec3 c){
    vec4 K=vec4(1.,2./3.,1./3.,3.);
    vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);
    return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);
  }
  void main(){
    vec3 viewDirection=normalize(cameraPosition-vPosition);
    float fresnel=pow(1.-abs(dot(viewDirection,normalize(vNormal))),2.);
    vec3 normalWorld=normalize(vNormal);
    float rainbowShift=normalWorld.x*0.5+normalWorld.y*0.2+normalWorld.z*0.1;
    rainbowShift+=sin(vPosition.x*5.+time*0.5)*0.01+cos(vPosition.y*4.-time*0.3)*0.01;
    rainbowShift=fract(rainbowShift);
    vec3 rainbow=hsv2rgb(vec3(rainbowShift,.8,1.));
    vec3 hsv=rgb2hsv(sphereColor);
    float aberrationAmount=chromaticAberration*fresnel;

function initOrb() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  const canvas = document.getElementById('threeCanvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const initialState = orbStates.idle;
  initialState.layers.forEach((lc, idx) => {
    const geo = new THREE.SphereGeometry(lc.scale, 80, 80);
    const mat = new THREE.ShaderMaterial({
      vertexShader, fragmentShader,
      uniforms: {
        time: { value: 0 },
        audioLevel: { value: 0 },
        layerOffset: { value: idx * 2.0 },
        sphereColor: { value: new THREE.Color(lc.color) },
        opacity: { value: lc.opacity },
        chromaticAberration: { value: initialState.chromaticAberration },
        cameraPosition: { value: camera.position }
      },
      transparent: true, side: THREE.DoubleSide,
      blending: THREE.NormalBlending, depthWrite: false
    });
    const sphere = new THREE.Mesh(geo, mat);
    sphere.userData = { baseScale: lc.scale, rotationSpeed: lc.rotationSpeed };
    scene.add(sphere);
    orbLayers.push(sphere);
  });

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const pl1 = new THREE.PointLight(0x667eea, 0.6, 100);
  pl1.position.set(5, 5, 5); scene.add(pl1);
  const pl2 = new THREE.PointLight(0x764ba2, 0.4, 100);
  pl2.position.set(-5, -5, 5); scene.add(pl2);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Click on canvas = toggle recording
  canvas.addEventListener('click', () => toggleRecording());

  animateOrb();
}

function setOrbState(stateName) {
  if (!orbStates[stateName]) return;
  currentOrbState = stateName;
  const state = orbStates[stateName];
  orbLayers.forEach((layer, idx) => {
    const lc = state.layers[idx];
    if (!lc) return;
    layer.material.uniforms.sphereColor.value.setHex(lc.color);
    layer.material.uniforms.opacity.value = lc.opacity;
    layer.material.uniforms.chromaticAberration.value = state.chromaticAberration;
    layer.userData.rotationSpeed = lc.rotationSpeed;
    layer.userData.baseScale = lc.scale;
  });
}

function updateSpeakingCadence() {
  const now = Date.now() * 0.001;
  if (now >= speakingCadence.nextChange) {
    const t = Math.random();
    if (t < 0.3) { speakingCadence.intensity = 0.7 + Math.random() * 0.3; speakingCadence.nextChange = now + 0.15 + Math.random() * 0.15; }
    else if (t < 0.6) { speakingCadence.intensity = 0.5 + Math.random() * 0.4; speakingCadence.nextChange = now + 0.3 + Math.random() * 0.3; }
    else if (t < 0.85) { speakingCadence.intensity = 0.6 + Math.random() * 0.4; speakingCadence.nextChange = now + 0.5 + Math.random() * 0.4; }
    else { speakingCadence.intensity = 0.1 + Math.random() * 0.2; speakingCadence.nextChange = now + 0.2 + Math.random() * 0.3; }
  }
  return Math.max(0, speakingCadence.intensity + Math.sin(Date.now() * 0.001 * 10) * 0.08);
}

function animateOrb() {
  requestAnimationFrame(animateOrb);
  const state = orbStates[currentOrbState];

  if (state.pulsate) {
    if (state.pulsateMode === 'thinking') {
      const p = (Math.sin(Date.now() * 0.001 * 1.5) + 1) / 2;
      targetScale = 1 + state.pulsateMin + p * (state.pulsateMax - state.pulsateMin);
    } else if (state.pulsateMode === 'cadence' || state.pulsateMode === 'audio-reactive') {
      const c = updateSpeakingCadence();
      targetScale = 1 + state.pulsateMin + c * (state.pulsateMax - state.pulsateMin);
    }
    currentScale += (targetScale - currentScale) * 0.15;
  } else {
    currentScale += (1.0 - currentScale) * 0.1;
  }

  orbLayers.forEach((layer, idx) => {
    const lc = state.layers[idx];
    if (!lc) return;
    layer.material.uniforms.time.value += state.timeSpeed;
    layer.material.uniforms.audioLevel.value = state.audioLevel;
    layer.rotation.x += layer.userData.rotationSpeed.x;
    layer.rotation.y += layer.userData.rotationSpeed.y;
    layer.rotation.z += layer.userData.rotationSpeed.z;
    const s = layer.userData.baseScale * currentScale;
    layer.scale.set(s, s, s);
  });

  renderer.render(scene, camera);
}

}
function pcmToWav(pcm,sr) {
  const buf = new ArrayBuffer(44+pcm.length*2);
  const v = new DataView(buf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+pcm.length*2,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,pcm.length*2,true);
  for(let i=0;i<pcm.length;i++)v.setInt16(44+i*2,Math.max(-1,Math.min(1,pcm[i]))*0x7FFF,true);
  return buf;
}

    greetingText.textContent='你好，我是臺史博助理';
    greetingSubtext.textContent='點球球說話，或向上滑動查看對話';
  }
  isLoading=false; sendBtn.disabled=false;
}

function askChip(btn) { openDrawer(); setTimeout(()=>sendMessage(btn.textContent),150); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }

// Init
window.addEventListener('DOMContentLoaded', initOrb);
</script>
</body>
</html>

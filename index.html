<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gotour AI 智慧小工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400&display=swap');

:root {
  --primary: #90E0EF;
  --secondary: #FFCCBC;
  --tertiary: #F48FB1;
  --neutral: #F0F4F8;
  --surface: rgba(255,255,255,0.18);
  --surface2: rgba(255,255,255,0.28);
  --border: rgba(255,255,255,0.38);
  --accent: #F48FB1;
  --text: #f0f8ff;
  --text-dim: rgba(200,240,255,0.6);
  --text-dimmer: rgba(200,240,255,0.35);
  --user-bubble: rgba(244,143,177,0.18);
  --user-border: rgba(244,143,177,0.32);
  --drawer-bg: rgba(240,244,248,0.78);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; height: 100dvh;
  background: #020510;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 300;
  overflow: hidden;
  user-select: none;
}

/* ── Canvas (Three.js) ───────────────────────────── */
#threeCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  cursor: pointer;
  pointer-events: all;
  background: transparent;
}

/* ── App overlay ─────────────────────────────────── */
.app {
  position: relative; z-index: 3;
  height: 100%; height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center;
  pointer-events: none;
}
.app > * { pointer-events: all; }

/* ── Header ──────────────────────────────────────── */
.header {
  width: 100%; padding: 18px 24px 0;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.header-logo { display: flex; align-items: center; justify-content: center; width: 100%; }
.logo-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, #00ffcc, #00aaff);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif TC', serif;
  font-size: 13px; color: #fff; font-weight: 600;
}
.logo-text { font-size: 13px; color: rgba(42,58,74,0.6); letter-spacing: 0.06em; }
.status-pill {
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,255,200,0.08);
  border: 1px solid rgba(0,255,200,0.2);
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; color: rgba(0,255,200,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.status-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #00ffcc;
  box-shadow: 0 0 8px rgba(0,255,200,0.9);
  animation: sPulse 2.5s ease-in-out infinite;
}
@keyframes sPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Greeting ────────────────────────────────────── */
.greeting {
  margin-top: 52px;
  text-align: center;
  pointer-events: none;
}
.greeting h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 26px; font-weight: 600;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.92);
  text-shadow: 0 0 30px rgba(0,255,200,0.4);
}
.greeting p {
  font-size: 11px; color: rgba(200,240,255,0.6);
  margin-top: 10px; letter-spacing: 0.05em;
  text-shadow: 0 0 15px rgba(0,255,200,0.2);
}

/* ── Center spacer (canvas takes up most of screen) ── */
.orb-spacer { flex: 1; pointer-events: none; }

/* ── Voice label ─────────────────────────────────── */
.voice-label {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.08em;
  height: 20px;
  transition: opacity 0.3s;
  text-align: center;
  pointer-events: none;
}

/* ── Bottom bar ──────────────────────────────────── */


.bottom-bar {
  width: 100%; padding: 14px 24px 20px;
  display: flex; align-items: center; justify-content: center;
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-bar { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
}
.tab-bar {
  display: flex; align-items: center;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 28px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
}
.tab-icon-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  background: none; border: none;
  cursor: pointer;
  padding: 10px 24px;
  transition: background 0.2s;
  position: relative;
  flex: 1;
}
.tab-icon-btn + .tab-icon-btn {
  border-left: 1px solid rgba(255,255,255,0.15);
}
.tab-icon-btn:active { background: rgba(255,255,255,0.15); }
.tab-icon-btn svg { width: 20px; height: 20px; }
.tab-icon-btn span { font-size: 9px; color: #ffffff; letter-spacing: 0.05em; display: block; }
.chat-tab-btn svg { width: 22px; height: 22px; }
.chat-tab-btn span { font-size: 10px; letter-spacing: 0.05em; color: rgba(200,240,255,0.6); }
.tab-icon-btn.has-messages .notif-dot {
  display: block;
}
.notif-dot {
  display: none;
  position: absolute; top: 6px; right: 12px;
  width: 7px; height: 7px;
  background: #F48FB1; border-radius: 50%;
  box-shadow: 0 0 6px rgba(244,143,177,0.7);
}

/* ── Drawer ──────────────────────────────────────── */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 9;
  background: rgba(0,0,0,0.35);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(3px);
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
  height: 64%;
  background: rgba(2,5,16,0.85);
  border-top: 1px solid rgba(0,255,200,0.15);
  border-radius: 22px 22px 0 0;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  box-shadow: 0 -8px 48px rgba(0,255,200,0.1);
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
}
.drawer.open { transform: translateY(0); }

.drawer-handle {
  width: 36px; height: 4px;
  background: rgba(0,255,200,0.2);
  border-radius: 2px;
  margin: 12px auto 0;
  cursor: pointer; flex-shrink: 0;
}
.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px 6px; flex-shrink: 0;
}
.drawer-title {
  font-size: 12px; color: rgba(0,255,200,0.6);
  letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 6px;
}
.drawer-title svg { width: 12px; height: 12px; opacity: 0.5; }
.drawer-close-btn {
  background: rgba(0,255,200,0.08); border: 1px solid rgba(0,255,200,0.2); cursor: pointer;
  width: 26px; height: 26px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(0,255,200,0.6);
}
.drawer-close-btn svg { width: 13px; height: 13px; }

.chip-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 0 16px 8px; flex-shrink: 0;
}
.chip-btn {
  background: rgba(0,255,200,0.07); border: 1px solid rgba(0,255,200,0.18);
  color: rgba(200,240,255,0.65); font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; padding: 5px 11px; border-radius: 20px;
  cursor: pointer; white-space: nowrap; -webkit-appearance: none;
  transition: all 0.15s; backdrop-filter: blur(10px);
  box-shadow: 0 2px 8px rgba(200,140,200,0.1);
}
.chip-btn:active { border-color: rgba(144,224,239,0.5); background: rgba(255,255,255,0.55); }

.chat-area {
  flex: 1; overflow-y: auto; padding: 6px 16px 10px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
}
.chat-area::-webkit-scrollbar { width: 0; }

.chat-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.chat-empty p { font-size: 12px; color: var(--text-dimmer); text-align: center; line-height: 1.9; }

.msg { display: flex; gap: 8px; animation: msgIn 0.22s ease; }
.msg.user { flex-direction: row-reverse; }
@keyframes msgIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

.avatar {
  width: 24px; height: 24px; border-radius: 7px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500; margin-top: 2px;
}
.avatar.bot {
  background: #fff;
  overflow: hidden;
  padding: 0;
}
.avatar.bot img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
.avatar.user { background: var(--surface2); color: var(--text-dim); }

.bubble {
  max-width: calc(100% - 66px);
  padding: 9px 12px; font-size: 13px; line-height: 1.8;
  border-radius: 14px; word-break: break-word;
}
.bubble.bot { background: rgba(0,255,200,0.08); border: 1px solid rgba(0,255,200,0.2); color: #f0f8ff; border-top-left-radius: 3px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.bubble.user { background: rgba(170,68,255,0.15); border: 1px solid rgba(170,68,255,0.3); color: #f0f8ff; border-top-right-radius: 3px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.bubble.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }

.typing { display: flex; gap: 8px; align-items: flex-end; }
.typing-dots {
  background: var(--surface); border: 1px solid var(--border);
  border-top-left-radius: 3px; border-radius: 14px;
  padding: 11px 14px; display: flex; gap: 4px; align-items: center;
}
.typing-dots span {
  width: 4px; height: 4px; background: var(--text-dim);
  border-radius: 50%; animation: tdB 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes tdB{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}

.drawer-input-area {
  padding: 8px 14px 12px; border-top: 1px solid var(--border); flex-shrink: 0;
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .drawer-input-area { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
}
.drawer-input-wrap {
  display: flex; gap: 7px; align-items: flex-end;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(0,255,200,0.2);
  border-radius: 14px; padding: 8px 11px; transition: all 0.2s;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 2px 12px rgba(200,140,200,0.1);
}
.drawer-input-wrap:focus-within { border-color: rgba(0,255,200,0.4); box-shadow: 0 2px 20px rgba(0,255,200,0.15); }
textarea {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px; font-weight: 300; resize: none;
  line-height: 1.6; max-height: 80px; min-height: 22px; padding: 0;
}
textarea::placeholder { color: rgba(0,255,200,0.3); }
.send-btn {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #00ffcc, #00aaff);
  border: none; border-radius: 9px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; -webkit-appearance: none; transition: opacity 0.2s;
}
.send-btn:active { opacity: 0.8; }
.send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.send-btn svg { width: 13px; height: 13px; fill: #fff; }

/* ── Tablet / Desktop ────────────────────────────── */
@media (min-width: 600px) {
  .greeting h2 { font-size: 24px; }
  .drawer { max-width: 480px; left: 50%; transform: translateX(-50%) translateY(100%); }
  .drawer.open { transform: translateX(-50%) translateY(0); }
  .drawer-overlay { display: none; }
}


/* ── Aurora background ───────────────────────────── */
@property --a1{syntax:'<angle>';initial-value:0deg;inherits:false}
@property --a2{syntax:'<angle>';initial-value:60deg;inherits:false}
@property --a3{syntax:'<angle>';initial-value:120deg;inherits:false}

.aurora-bg {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
  background: #020510;
}

.aurora-layer {
  position: absolute; inset: 0;
  filter: blur(55px);
  opacity: 0.82;
  animation: auroraPulse 14s ease-in-out infinite alternate;
}
@keyframes auroraPulse {
  0%   { opacity: 0.7;  filter: blur(55px); }
  50%  { opacity: 0.92; filter: blur(45px); }
  100% { opacity: 0.72; filter: blur(65px); }
}

.aurora-band {
  position: absolute;
  width: 200%; left: -50%;
  border-radius: 50%;
  transform-origin: center center;
}

.ab1 {
  height: 80vh; top: -20vh;
  background: conic-gradient(from var(--a1) at 40% 60%,
    transparent 0%,
    rgba(0,255,200,0.5)  12%,
    rgba(0,170,255,0.4)  28%,
    transparent 42%,
    rgba(170,68,255,0.3) 58%,
    transparent 72%
  );
  animation: ab1spin 20s linear infinite;
}
@keyframes ab1spin { to { --a1: 360deg } }

.ab2 {
  height: 85vh; top: 0vh;
  background: conic-gradient(from var(--a2) at 62% 38%,
    transparent 0%,
    rgba(255,102,170,0.4) 10%,
    rgba(0,255,200,0.3)   26%,
    transparent 40%,
    rgba(0,170,255,0.5)   54%,
    transparent 68%
  );
  animation: ab2spin 28s linear infinite reverse;
}
@keyframes ab2spin { to { --a2: 420deg } }

.ab3 {
  height: 70vh; top: -5vh;
  background: conic-gradient(from var(--a3) at 28% 72%,
    transparent 0%,
    rgba(68,255,170,0.4)  18%,
    transparent 32%,
    rgba(255,102,170,0.3) 48%,
    rgba(170,68,255,0.4)  62%,
    transparent 78%
  );
  animation: ab3spin 22s linear infinite;
}
@keyframes ab3spin { to { --a3: 480deg } }

.museum-name {
  font-size: 15px;
  font-weight: 300;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.14em;
  font-family: 'Noto Serif TC', serif;
}

/* ── Map Drawer ──────────────────────────────────── */
.map-drawer {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 10; height: 80%;
  background: rgba(2,5,16,0.96); border-top: 1px solid rgba(0,255,200,0.15);
  border-radius: 22px 22px 0 0; box-shadow: 0 -8px 48px rgba(0,255,200,0.08);
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
  visibility: hidden;
}
.map-drawer.open { transform: translateY(0); visibility: visible; }
.map-overlay, .exhibit-overlay {
  position: fixed; inset: 0; z-index: 9;
  background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.map-overlay.open, .exhibit-overlay.open { opacity: 1; pointer-events: all; }
.map-handle, .exhibit-handle {
  width: 36px; height: 4px; background: rgba(0,255,200,0.2);
  border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; cursor: pointer;
}
.map-header, .exhibit-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px 0; flex-shrink: 0;
}
.map-header-title, .exhibit-header-title { font-size: 13px; color: rgba(0,255,200,0.8); letter-spacing: 0.06em; }
.map-close-btn, .exhibit-close-btn {
  background: rgba(0,255,200,0.08); border: 1px solid rgba(0,255,200,0.2);
  cursor: pointer; width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; color: rgba(0,255,200,0.6);
}
.map-close-btn svg, .exhibit-close-btn svg { width: 14px; height: 14px; }
.map-tabs {
  display: flex; margin: 12px 20px 0;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; overflow: hidden; flex-shrink: 0;
}
.map-tab {
  flex: 1; padding: 9px 0; background: none; border: none; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif; font-size: 12px;
  color: rgba(255,255,255,0.45); transition: all 0.2s; letter-spacing: 0.05em;
}
.map-tab.active { background: rgba(0,255,200,0.15); color: rgba(0,255,200,0.9); }
.map-tab + .map-tab { border-left: 1px solid rgba(255,255,255,0.1); }
.map-body { flex: 1; overflow: hidden; margin: 12px 16px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); position: relative; }
.map-panel { display: none; width: 100%; height: 100%; position: relative; }
.map-panel.active { display: block; }
.map-zoom-wrap { width: 100%; height: 100%; overflow: hidden; position: relative; cursor: grab; background: #000; }
.map-zoom-wrap:active { cursor: grabbing; }
.map-zoom-inner { width: 100%; height: 100%; transform-origin: 0 0; will-change: transform; }
.map-zoom-inner img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; user-select: none; }
.map-zoom-btns { position: absolute; bottom: 14px; right: 14px; display: flex; flex-direction: column; gap: 6px; z-index: 2; }
.map-zoom-btn { width: 36px; height: 36px; background: rgba(2,5,16,0.85); border: 1px solid rgba(0,255,200,0.25); border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(0,255,200,0.85); font-size: 20px; }

/* ── Exhibition Drawer ───────────────────────────── */
.exhibit-drawer {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 10; height: 40%;
  background: rgba(2,5,16,0.96); border-top: 1px solid rgba(0,255,200,0.15);
  border-radius: 22px 22px 0 0; box-shadow: 0 -8px 48px rgba(0,255,200,0.08);
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32,0.72,0,1), height 0.4s cubic-bezier(0.32,0.72,0,1);
  visibility: hidden;
}
.exhibit-drawer.open { transform: translateY(0); visibility: visible; }
.exhibit-drawer.expanded { height: 85%; }
.exhibit-strip { flex: 1; overflow: hidden; padding: 10px 16px 14px; display: flex; }
.exhibit-scroll { display: flex; gap: 12px; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; align-items: stretch; width: 100%; }
.exhibit-scroll::-webkit-scrollbar { display: none; }
.exhibit-card { scroll-snap-align: start; flex: 0 0 75vw; max-width: 300px; border-radius: 14px; overflow: hidden; cursor: pointer; position: relative; border: 1px solid rgba(0,255,200,0.12); display: flex; flex-direction: column; }
.exhibit-card:active { border-color: rgba(0,255,200,0.35); }
.exhibit-card-img-wrap { position: relative; width: 100%; flex: 1; min-height: 0; overflow: hidden; }
.exhibit-card-banner { width: 100%; height: 100%; object-fit: cover; display: block; }
.exhibit-card-img-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(2,5,16,0.92) 0%, rgba(2,5,16,0.4) 45%, transparent 70%); }
.exhibit-card-name { position: absolute; bottom: 8px; left: 12px; right: 12px; font-size: 13px; font-weight: 400; color: #fff; line-height: 1.4; font-family: 'Noto Serif TC', serif; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.exhibit-card-footer { padding: 8px 12px; background: rgba(2,5,16,0.96); flex-shrink: 0; }
.exhibit-card-meta { font-size: 10px; color: rgba(200,240,255,0.5); line-height: 1.6; }
.exhibit-card-btn { display: flex; align-items: center; gap: 4px; margin-top: 5px; font-size: 10px; color: rgba(0,255,200,0.7); letter-spacing: 0.05em; background: none; border: none; padding: 0; cursor: pointer; }
.exhibit-card-btn svg { width: 11px; height: 11px; }
.exhibit-detail { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.exhibit-drawer.expanded .exhibit-strip { display: none; }
.exhibit-drawer.expanded .exhibit-detail { display: flex; }
.exhibit-detail-back { display: flex; align-items: center; gap: 6px; padding: 8px 20px 0; flex-shrink: 0; font-size: 12px; color: rgba(0,255,200,0.7); cursor: pointer; background: none; border: none; letter-spacing: 0.05em; }
.exhibit-detail-back svg { width: 14px; height: 14px; }
.exhibit-detail-scroll { flex: 1; overflow-y: auto; padding: 12px 20px 24px; -webkit-overflow-scrolling: touch; }
.exhibit-detail-scroll::-webkit-scrollbar { width: 0; }
.exhibit-detail-banner { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 14px; }
.exhibit-detail-badge { display: inline-block; font-size: 9px; background: rgba(0,255,200,0.12); border: 1px solid rgba(0,255,200,0.25); color: rgba(0,255,200,0.8); padding: 2px 8px; border-radius: 20px; letter-spacing: 0.08em; margin-bottom: 8px; }
.exhibit-detail-title { font-size: 17px; font-weight: 600; color: rgba(255,255,255,0.92); font-family: 'Noto Serif TC', serif; line-height: 1.4; margin-bottom: 10px; }

<script>

// ═══════════════════════════════════════════════════
// INTERACTIVE DOT GRID
// ═══════════════════════════════════════════════════
(function() {
  const dc = document.getElementById('dotCanvas');
  const ctx = dc.getContext('2d');
  const DOT_SPACING = 20;
  const DOT_R = 0.7;
  const INFLUENCE = 80;
  const WHITE = [255, 255, 255];
  let mouse = { x: -999, y: -999 };
  let dots = [];
  let W, H;

  function resize() {
    W = dc.width = window.innerWidth;
    H = dc.height = window.innerHeight;
    dots = [];
    for (let x = DOT_SPACING; x < W; x += DOT_SPACING) {
      for (let y = DOT_SPACING; y < H; y += DOT_SPACING) {
        dots.push({ x, y, r: DOT_R, alpha: 0, targetAlpha: 0 });
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const now = Date.now() * 0.001;

    dots.forEach((d, i) => {
      const dx = d.x - mouse.x;
      const dy = d.y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < INFLUENCE) {
        const t = 1 - dist / INFLUENCE;
        d.targetAlpha = t * 0.55;
  
      } else {
        // Subtle idle twinkle
        d.targetAlpha = (Math.sin(now * 0.6 + d.x * 0.04 + d.y * 0.03) * 0.5 + 0.5) * 0.05;
  
      }

      // Smooth interpolation
      d.alpha += (d.targetAlpha - d.alpha) * 0.12;


      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);

      ctx.fillStyle = `rgba(255,255,255,${d.alpha})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('touchmove', e => {
    if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
  }, { passive: true });
  window.addEventListener('touchend', () => { mouse.x = -999; mouse.y = -999; });

  resize();
  draw();
})();

// ═══════════════════════════════════════════════════
// THREE.JS ORB  (from aguscruiz/voiceorb, adapted)
// ═══════════════════════════════════════════════════
let scene, camera, renderer, orbLayers = [];
let currentOrbState = 'idle';
let targetScale = 1.0, currentScale = 1.0;
let speakingCadence = { time:0, intensity:0, nextChange:0 };

const orbStates = {
  idle: {
    layers: [
      { color:0x00ffcc, opacity:0.45, scale:1.0,  rotationSpeed:{x:0.0002,y:0.0012,z:0.0001} },
      { color:0x00aaff, opacity:0.45, scale:0.85, rotationSpeed:{x:-0.0011,y:0.0003,z:0.0009} },
      { color:0xaa44ff, opacity:0.65, scale:0.70, rotationSpeed:{x:0.0007,y:-0.0002,z:-0.0014} }
    ],
    audioLevel:0.15, timeSpeed:0.012, pulsate:true, pulsateMode:'breathing', pulsateMin:-0.45, pulsateMax:0.65, chromaticAberration:1.8
  },
  listening: {
    layers: [
      { color:0x00ffcc, opacity:0.55, scale:1.0,  rotationSpeed:{x:0.002,y:0.004,z:0} },
      { color:0x44ffaa, opacity:0.55, scale:0.85, rotationSpeed:{x:-0.003,y:0.005,z:0.002} },
      { color:0x00ddff, opacity:0.75, scale:0.70, rotationSpeed:{x:0.004,y:-0.003,z:-0.001} }
    ],

      { color:0x8833ee, opacity:0.5, scale:0.72, rotationSpeed:{x:-0.004,y:0.004,z:0.002} },
      { color:0xcc66ff, opacity:0.7, scale:0.60, rotationSpeed:{x:0.005,y:-0.004,z:-0.002} }
    ],
    audioLevel:0.45, timeSpeed:0.02, pulsate:true, pulsateMode:'thinking',
    pulsateMin:0.0, pulsateMax:0.15, chromaticAberration:1.5
  },
  speaking: {
    layers: [
      { color:0xff66aa, opacity:0.55, scale:1.0,  rotationSpeed:{x:0.004,y:0.005,z:0} },
      { color:0xff44aa, opacity:0.55, scale:0.85, rotationSpeed:{x:-0.005,y:0.006,z:0.003} },
      { color:0xff88cc, opacity:0.72, scale:0.70, rotationSpeed:{x:0.006,y:-0.005,z:-0.002} }
    ],
    audioLevel:0.8, timeSpeed:0.027, pulsate:true, pulsateMode:'cadence',
    pulsateMin:0.05, pulsateMax:0.25, chromaticAberration:2.8
  }
};

const vertexShader = `
  varying vec3 vNormal; varying vec3 vPosition; varying vec2 vUv;
  uniform float time; uniform float audioLevel; uniform float layerOffset;
  vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
  vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
  vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
  float snoise(vec3 v){
    const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);
    vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
    vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;
    vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
    vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
    i=mod289(i);
    vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
    float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
    vec4 j=p-49.*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);
    vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.-abs(x)-abs(y);
    vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
    vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));
    vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
    vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
    vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
    vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;
    return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }
  void main(){
    vUv=uv;vNormal=normalize(normalMatrix*normal);
    vec3 pos=position;
    float wave1=sin(pos.y*2.5+time*1.5+layerOffset)*cos(pos.x*2.-time*1.2);
    float wave2=sin(pos.x*3.-time*1.8+layerOffset)*cos(pos.z*2.5+time*1.5);
    float wave3=sin(pos.z*2.8+time*1.6+layerOffset)*cos(pos.y*2.3-time*1.3);
    float noise1=snoise(pos*0.7+time*0.25+layerOffset);
    float noise2=snoise(pos*1.1-time*0.18+layerOffset*0.5);
    float distortion=(wave1+wave2+wave3)*0.018+(noise1*0.016+noise2*0.014);
    distortion*=(0.3+audioLevel*0.6);
    pos=pos+normal*distortion;
    vPosition=pos;
    gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.);
  }
`;

const fragmentShader = `
  varying vec3 vNormal; varying vec3 vPosition; varying vec2 vUv;
  uniform vec3 sphereColor; uniform float opacity; uniform float time; uniform float chromaticAberration;

  vec3 rgb2hsv(vec3 c){
    vec4 K=vec4(0.,-1./3.,2./3.,-1.);
    vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g));
    vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r));
    float d=q.x-min(q.w,q.y);float e=1.e-10;
    return vec3(abs(q.z+(q.w-q.y)/(6.*d+e)),d/(q.x+e),q.x);
  }
  vec3 hsv2rgb(vec3 c){
    vec4 K=vec4(1.,2./3.,1./3.,3.);
    vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);
    return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);
  }

  void main(){
    vec3 viewDir=normalize(cameraPosition-vPosition);
    vec3 norm=normalize(vNormal);
    float fresnel=pow(1.-abs(dot(viewDir,norm)),2.5);

    /* ── Rainbow holographic shift ── */
    float rainbowShift=norm.x*0.5+norm.y*0.2+norm.z*0.1;
    rainbowShift+=sin(vPosition.x*5.+time*0.5)*0.01+cos(vPosition.y*4.-time*0.3)*0.01;
    rainbowShift=fract(rainbowShift);
    vec3 rainbow=hsv2rgb(vec3(rainbowShift,0.9,1.2));

    /* ── Chromatic aberration ── */
    vec3 hsv=rgb2hsv(sphereColor);

    color=mix(color,rainbow,holoI*0.65);

    /* ── Glass: dark interior, bright edge glow ── */
    float edgeGlow=pow(fresnel, 1.2);
    float interior=1.-edgeGlow;

    /* Deep transparent interior */
    float glassAlpha=mix(opacity*0.55, opacity*1.0, edgeGlow);

    color+=edgeGlow*chromaticAberration*0.25;

    });

function updateSpeakingCadence() {
  const now = Date.now() * 0.001;
  if (now >= speakingCadence.nextChange) {
    const t = Math.random();
    if (t < 0.3) { speakingCadence.intensity = 0.7 + Math.random() * 0.3; speakingCadence.nextChange = now + 0.15 + Math.random() * 0.15; }
    else if (t < 0.6) { speakingCadence.intensity = 0.5 + Math.random() * 0.4; speakingCadence.nextChange = now + 0.3 + Math.random() * 0.3; }
    else if (t < 0.85) { speakingCadence.intensity = 0.6 + Math.random() * 0.4; speakingCadence.nextChange = now + 0.5 + Math.random() * 0.4; }
    else { speakingCadence.intensity = 0.1 + Math.random() * 0.2; speakingCadence.nextChange = now + 0.2 + Math.random() * 0.3; }
  }
  return Math.max(0, speakingCadence.intensity + Math.sin(Date.now() * 0.001 * 10) * 0.08);

function animateOrb() {

  const state = orbStates[currentOrbState];

      targetScale = 1 + state.pulsateMin + c * (state.pulsateMax - state.pulsateMin);
    }
    const smoothFactor = currentOrbState === "idle" ? 0.04 : 0.15;
    currentScale += (targetScale - currentScale) * smoothFactor;
  } else {
    currentScale += (1.0 - currentScale) * 0.1;
  }

  orbLayers.forEach((layer, idx) => {
    const lc = state.layers[idx];
    if (!lc) return;
    layer.material.uniforms.time.value += state.timeSpeed;
    layer.material.uniforms.audioLevel.value = state.audioLevel;
    layer.rotation.x += layer.userData.rotationSpeed.x;
    layer.rotation.y += layer.userData.rotationSpeed.y;
    layer.rotation.z += layer.userData.rotationSpeed.z;
    const s = layer.userData.baseScale * currentScale;
    layer.scale.set(s, s, s);
  });

  renderer.render(scene, camera);
}

async function callGemini(userMessage) {
  conversationHistory.push({role:'user',parts:[{text:userMessage}]});
  const res = await fetch(`${WORKER}/gemini`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      system_instruction:{parts:[{text:SYSTEM_PROMPT}]},
      contents: conversationHistory,
      generationConfig:{maxOutputTokens:600,temperature:0.3}
    })
  });
  if (!res.ok) throw new Error(`${res.status}`);
  const data = await res.json();
  const reply = data.candidates[0].content.parts[0].text;
  conversationHistory.push({role:'model',parts:[{text:reply}]});

async function speakText(text) {
  if (currentSource) {
    try { currentSource.stop(); } catch(e) {}
    currentSource = null;
  }
  setOrbState('speaking');
  setVoiceLabel('說話中…');
  try {
    const ctx = getAudioCtx();
    const res = await fetch(`${WORKER}/tts`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    if (!res.ok) throw new Error('TTS failed');
    const arrayBuf = await res.arrayBuffer();
    ctx.decodeAudioData(arrayBuf, (decodedBuf) => {
      const source = ctx.createBufferSource();
      source.buffer = decodedBuf;
      source.connect(ctx.destination);
      currentSource = source;
      source.onended = () => {
        if (currentSource === source) currentSource = null;
        setOrbState('idle'); setVoiceLabel('');
        greetingText.textContent = 'Gotour AI 智慧小助手';
        greetingSubtext.textContent = '可以跟我對話，或是往上滑也可以用打字的噓';
      };
      source.start(0);
    }, (err) => {
      console.error('Decode error:', err);
      setOrbState('idle'); setVoiceLabel('');
    });
  } catch(e) {
    console.error('TTS error:', e);
    setOrbState('idle'); setVoiceLabel('');
  }
}

async function toggleRecording() {

        });
        const data = await res.json();
        const text = data.DisplayText || '';
        setVoiceLabel('');
        if (text) {
          sendMessage(text);
        } else {
          setOrbState('idle');
          setVoiceLabel('未偵測到語音');
          setTimeout(()=>setVoiceLabel(''), 2000);
        }
      } catch { setOrbState('idle'); setVoiceLabel('辨識失敗，請再試'); setTimeout(()=>setVoiceLabel(''),2500); }
    };

    setVoiceLabel('無法存取麥克風'); setTimeout(()=>setVoiceLabel(''),2500);
  }
}

async function convertToWav(blob) {
  // Use sharedAudioCtx to decode, then OfflineAudioContext to resample
  // This keeps us to a single AudioContext for all audio operations
  const arrayBuf = await blob.arrayBuffer();
  return new Promise((resolve, reject) => {
    const ctx = getAudioCtx();
    ctx.decodeAudioData(arrayBuf.slice(0), (audioBuffer) => {
      const offlineCtx = new OfflineAudioContext(
        1,
        Math.ceil(audioBuffer.duration * 16000),
        16000
      );
      const src = offlineCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(offlineCtx.destination);
      src.start(0);
      offlineCtx.startRendering().then(rendered => {
        const pcm = rendered.getChannelData(0);
        resolve(new Blob([pcmToWav(pcm, 16000)], {type:'audio/wav'}));
      }).catch(reject);
    }, reject);
  });
}
function pcmToWav(pcm,sr) {
  const buf = new ArrayBuffer(44+pcm.length*2);
  const v = new DataView(buf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+pcm.length*2,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,pcm.length*2,true);
  for(let i=0;i<pcm.length;i++)v.setInt16(44+i*2,Math.max(-1,Math.min(1,pcm[i]))*0x7FFF,true);
  return buf;
}

function buildReplyWithContext(question, reply) {
  const q = question;

  const specificQ = ['地方記憶','遊牧','轉機','臺灣女子','開箱吧','桌遊特展'];
  const exhibitQ  = ['展覽','特展','有什麼展','推薦展覽','有哪些展','現在有什麼展'];
  const mapQ = [
    '廁所','洗手間','哺乳','育嬰','電梯','停車場','服務台','詢問台',
    '紀念品','文創','餐廳','咖啡','在哪裡','在哪','哪裡','幾樓',
    '入口','出口','怎麼走','怎麼進','位置','方向','路線','園區地圖'
  ];

  const hasSpecific = specificQ.some(k => q.includes(k));
  const hasExhibit  = exhibitQ.some(k => q.includes(k));
  const hasMap      = mapQ.some(k => q.includes(k));

  if (hasSpecific) {
    const idx = ['轉機','臺灣女子'].some(k=>q.includes(k)) ? 0
              : ['地方記憶','遊牧'].some(k=>q.includes(k)) ? 1
              : ['開箱吧','桌遊'].some(k=>q.includes(k)) ? 2 : -1;
    setTimeout(() => { openExhibitDrawer(); if (idx >= 0) openExhibitDetail(idx); }, 900);
    return reply + ' 我幫您開啟展覽資訊了，您可以參考。';
  } else if (hasExhibit) {
    setTimeout(() => openExhibitDrawer(), 900);
    return reply + ' 我幫您開啟展覽列表了，您可以參考。';
  } else if (hasMap) {
    setTimeout(() => openMapDrawer(), 900);
    return reply + ' 我馬上幫你開啟園區地圖。';
  }
  return reply;
}

  if (localStorage.getItem('ios_mute_warned')) return;

    （側邊靜音撥桿朝上）
    <div class="hint-sub">點任意處關閉此提示</div>
  `;
  document.body.appendChild(div);

  // Dismiss on any tap
  const dismiss = () => {
    div.style.opacity = '0';
    div.style.transition = 'opacity 0.3s';
    setTimeout(() => div.remove(), 300);
    localStorage.setItem('ios_mute_warned', '1');
    document.removeEventListener('touchstart', dismiss);
    document.removeEventListener('click', dismiss);
  };
  setTimeout(() => {
    document.addEventListener('touchstart', dismiss, {once:true, passive:true});
    document.addEventListener('click', dismiss, {once:true});
  }, 500);

  // Auto-dismiss after 5s
  setTimeout(dismiss, 5000);
}

function openExhibitDetail(idx){
  const ex=EXHIBITS[idx];
  document.getElementById('exhibitDetailScroll').innerHTML=`<img class="exhibit-detail-banner" src="${ex.banner}" alt="${ex.title}"><div class="exhibit-detail-badge">${ex.badge}</div><div class="exhibit-detail-title">${ex.title}</div><div class="exhibit-detail-meta">🗓 ${ex.date}<br>📍 ${ex.location}</div><div class="exhibit-detail-desc">${ex.desc}</div>`;
  document.getElementById('exhibitDetailScroll').scrollTop=0;
  document.getElementById('exhibitDrawer').classList.add('expanded');
}
function closeExhibitDetail(){document.getElementById('exhibitDrawer').classList.remove('expanded');}

// ── Wire up bottom buttons ──────────────────────────
function showComingSoon(name){const l=document.getElementById('voiceLabel');l.textContent=name+' 即將推出';l.style.opacity='1';setTimeout(()=>{l.textContent='';l.style.opacity='0';},2000);}

// Init
window.addEventListener('DOMContentLoaded', function(){
  initOrb();
  showIOSSilentWarning();
  // Auto-play BGM on first interaction
  document.addEventListener("touchstart", function tryBGM() {
    startBGM();
    document.removeEventListener("touchstart", tryBGM);
  }, {once:true, passive:true});
  document.addEventListener("click", function tryBGM() {
    startBGM();
    document.removeEventListener("click", tryBGM);
  }, {once:true});

  // ── Proper audio unlock on all user gesture entry points ──
  // Send button
  document.getElementById('sendBtn').addEventListener('click', async () => {
    await forceUnlockAudio().catch(()=>{});
    sendMessage();
  });

  // Chip buttons
  document.querySelectorAll('.chip-trigger').forEach(btn => {
    btn.addEventListener('click', async () => {
      await forceUnlockAudio().catch(()=>{});
      sendMessage(btn.textContent);
    });
  });

  // Input focus - pre-unlock
  const ua = document.getElementById('userInput');
  ua.addEventListener('focus', () => forceUnlockAudio().catch(()=>{}));
  ua.addEventListener('touchstart', () => forceUnlockAudio().catch(()=>{}), {passive:true});
  // Map touch
  ['Park','Indoor'].forEach(n=>{
    const w=document.getElementById('zoomWrap'+n);const s=mapS[n];
    w.addEventListener('mousedown',e=>{s.dragging=true;s.lx=e.clientX;s.ly=e.clientY;});
    window.addEventListener('mousemove',e=>{if(!s.dragging)return;s.x+=e.clientX-s.lx;s.y+=e.clientY-s.ly;s.lx=e.clientX;s.ly=e.clientY;applyMapTransform(n);});
    window.addEventListener('mouseup',()=>s.dragging=false);
    w.addEventListener('touchstart',e=>{if(e.touches.length===1){s.dragging=true;s.lx=e.touches[0].clientX;s.ly=e.touches[0].clientY;}},{passive:true});
    w.addEventListener('touchmove',e=>{if(s.dragging&&e.touches.length===1){s.x+=e.touches[0].clientX-s.lx;s.y+=e.touches[0].clientY-s.ly;s.lx=e.touches[0].clientX;s.ly=e.touches[0].clientY;applyMapTransform(n);}},{passive:true});
    w.addEventListener('touchend',()=>s.dragging=false,{passive:true});
    let ld=0;
    w.addEventListener('touchstart',e=>{if(e.touches.length===2)ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
    w.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(ld>0){s.scale=Math.min(Math.max(s.scale*(d/ld),1),5);applyMapTransform(n);}ld=d;}},{passive:true});
  });
  // Map swipe close
  const md=document.getElementById('mapDrawer');let mty=0;
  md.addEventListener('touchstart',e=>{mty=e.touches[0].clientY;},{passive:true});
  md.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-mty>80)closeMapDrawer();},{passive:true});
  // Exhibit swipe
  const ed=document.getElementById('exhibitDrawer');let ety=0;
  ed.addEventListener('touchstart',e=>{ety=e.touches[0].clientY;},{passive:true});
  ed.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ety>80){if(ed.classList.contains('expanded'))closeExhibitDetail();else closeExhibitDrawer();}},{passive:true});
});

</script>

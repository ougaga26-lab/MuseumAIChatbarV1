<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>臺史博 AI 助理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400&display=swap');

:root {
  --primary: #90E0EF;
  --secondary: #FFCCBC;
  --tertiary: #F48FB1;
  --neutral: #F0F4F8;
  --surface: rgba(255,255,255,0.18);
  --surface2: rgba(255,255,255,0.28);
  --border: rgba(255,255,255,0.38);
  --accent: #F48FB1;
  --text: #f0f8ff;
  --text-dim: rgba(200,240,255,0.6);
  --text-dimmer: rgba(200,240,255,0.35);
  --user-bubble: rgba(244,143,177,0.18);
  --user-border: rgba(244,143,177,0.32);
  --drawer-bg: rgba(240,244,248,0.78);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; height: 100dvh;
  background: #020510;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 300;
  overflow: hidden;
  user-select: none;
}

/* ── Canvas (Three.js) ───────────────────────────── */
#threeCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  cursor: pointer;
  pointer-events: all;
  background: transparent;
}

/* ── App overlay ─────────────────────────────────── */
.app {
  position: relative; z-index: 3;
  height: 100%; height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center;
  pointer-events: none;
}
.app > * { pointer-events: all; }

/* ── Header ──────────────────────────────────────── */
.header {
  width: 100%; padding: 18px 24px 0;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.header-logo { display: flex; align-items: center; justify-content: center; width: 100%; }
.logo-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, #00ffcc, #00aaff);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif TC', serif;
  font-size: 13px; color: #fff; font-weight: 600;
}
.logo-text { font-size: 13px; color: rgba(42,58,74,0.6); letter-spacing: 0.06em; }
.status-pill {
  display: flex; align-items: center; gap: 5px;
  background: rgba(0,255,200,0.08);
  border: 1px solid rgba(0,255,200,0.2);
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; color: rgba(0,255,200,0.65);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.status-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #00ffcc;
  box-shadow: 0 0 8px rgba(0,255,200,0.9);
  animation: sPulse 2.5s ease-in-out infinite;
}
@keyframes sPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Greeting ────────────────────────────────────── */
.greeting {
  margin-top: 52px;
  text-align: center;
  pointer-events: none;
}
.greeting h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 26px; font-weight: 600;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.92);
  text-shadow: 0 0 30px rgba(0,255,200,0.4);
}
.greeting p {
  font-size: 11px; color: rgba(200,240,255,0.6);
  margin-top: 10px; letter-spacing: 0.05em;
  text-shadow: 0 0 15px rgba(0,255,200,0.2);
}

/* ── Center spacer (canvas takes up most of screen) ── */
.orb-spacer { flex: 1; pointer-events: none; }

/* ── Voice label ─────────────────────────────────── */
.voice-label {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.08em;
  height: 20px;
  transition: opacity 0.3s;
  text-align: center;
  pointer-events: none;
}

/* ── Bottom bar ──────────────────────────────────── */
.bottom-bar {
  width: 100%; padding: 14px 24px 20px;
  display: flex; align-items: center; justify-content: center;
  gap: 20px;
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-bar { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
}

.chat-tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: rgba(0,255,200,0.08); border: 1px solid rgba(0,255,200,0.2);
  cursor: pointer;
  padding: 8px 20px; border-radius: 20px;
  color: rgba(80,40,90,0.75);
  transition: all 0.2s;
  position: relative;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 4px 20px rgba(200,140,200,0.2);
}
.chat-tab-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.97); }
.chat-tab-btn svg { width: 22px; height: 22px; }
.chat-tab-btn span { font-size: 10px; letter-spacing: 0.05em; color: rgba(200,240,255,0.6); }
.chat-tab-btn.has-messages .notif-dot {
  display: block;
}
.notif-dot {
  display: none;
  position: absolute; top: 6px; right: 12px;
  width: 7px; height: 7px;
  background: #F48FB1; border-radius: 50%;
  box-shadow: 0 0 6px rgba(244,143,177,0.7);
}

/* ── Drawer ──────────────────────────────────────── */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 9;
  background: rgba(0,0,0,0.35);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(3px);
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
  height: 64%;
  background: rgba(2,5,16,0.85);
  border-top: 1px solid rgba(0,255,200,0.15);
  border-radius: 22px 22px 0 0;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  box-shadow: 0 -8px 48px rgba(0,255,200,0.1);
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
}
.drawer.open { transform: translateY(0); }

.drawer-handle {
  width: 36px; height: 4px;
  background: rgba(0,255,200,0.2);
  border-radius: 2px;
  margin: 12px auto 0;
  cursor: pointer; flex-shrink: 0;
}
.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px 6px; flex-shrink: 0;
}
.drawer-title {
  font-size: 12px; color: rgba(0,255,200,0.6);
  letter-spacing: 0.06em;
  display: flex; align-items: center; gap: 6px;
}
.drawer-title svg { width: 12px; height: 12px; opacity: 0.5; }
.drawer-close-btn {
  background: rgba(0,255,200,0.08); border: 1px solid rgba(0,255,200,0.2); cursor: pointer;
  width: 26px; height: 26px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(0,255,200,0.6);
}
.drawer-close-btn svg { width: 13px; height: 13px; }

.chip-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 0 16px 8px; flex-shrink: 0;
}
.chip-btn {
  background: rgba(0,255,200,0.07); border: 1px solid rgba(0,255,200,0.18);
  color: rgba(200,240,255,0.65); font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; padding: 5px 11px; border-radius: 20px;
  cursor: pointer; white-space: nowrap; -webkit-appearance: none;
  transition: all 0.15s; backdrop-filter: blur(10px);
  box-shadow: 0 2px 8px rgba(200,140,200,0.1);
}
.chip-btn:active { border-color: rgba(144,224,239,0.5); background: rgba(255,255,255,0.55); }

.chat-area {
  flex: 1; overflow-y: auto; padding: 6px 16px 10px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
}
.chat-area::-webkit-scrollbar { width: 0; }

.chat-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.chat-empty p { font-size: 12px; color: var(--text-dimmer); text-align: center; line-height: 1.9; }

.msg { display: flex; gap: 8px; animation: msgIn 0.22s ease; }
.msg.user { flex-direction: row-reverse; }
@keyframes msgIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

.avatar {
  width: 24px; height: 24px; border-radius: 7px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500; margin-top: 2px;
}
.avatar.bot { background: linear-gradient(135deg, #00ffcc, #00aaff); color:#fff; font-family:'Noto Serif TC',serif; }
.avatar.user { background: var(--surface2); color: var(--text-dim); }

.bubble {
  max-width: calc(100% - 66px);
  padding: 9px 12px; font-size: 13px; line-height: 1.8;
  border-radius: 14px; word-break: break-word;
}
.bubble.bot { background: rgba(0,255,200,0.08); border: 1px solid rgba(0,255,200,0.2); color: #f0f8ff; border-top-left-radius: 3px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.bubble.user { background: rgba(170,68,255,0.15); border: 1px solid rgba(170,68,255,0.3); color: #f0f8ff; border-top-right-radius: 3px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.bubble.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }

.typing { display: flex; gap: 8px; align-items: flex-end; }
.typing-dots {
  background: var(--surface); border: 1px solid var(--border);
  border-top-left-radius: 3px; border-radius: 14px;
  padding: 11px 14px; display: flex; gap: 4px; align-items: center;
}
.typing-dots span {
  width: 4px; height: 4px; background: var(--text-dim);
  border-radius: 50%; animation: tdB 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes tdB{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}

.drawer-input-area {
  padding: 8px 14px 12px; border-top: 1px solid var(--border); flex-shrink: 0;
}
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .drawer-input-area { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
}
.drawer-input-wrap {
  display: flex; gap: 7px; align-items: flex-end;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(0,255,200,0.2);
  border-radius: 14px; padding: 8px 11px; transition: all 0.2s;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 2px 12px rgba(200,140,200,0.1);
}
.drawer-input-wrap:focus-within { border-color: rgba(0,255,200,0.4); box-shadow: 0 2px 20px rgba(0,255,200,0.15); }
textarea {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px; font-weight: 300; resize: none;
  line-height: 1.6; max-height: 80px; min-height: 22px; padding: 0;
}
textarea::placeholder { color: rgba(0,255,200,0.3); }
.send-btn {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #00ffcc, #00aaff);
  border: none; border-radius: 9px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; -webkit-appearance: none; transition: opacity 0.2s;
}
.send-btn:active { opacity: 0.8; }
.send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.send-btn svg { width: 13px; height: 13px; fill: #fff; }

/* ── Tablet / Desktop ────────────────────────────── */
@media (min-width: 600px) {
  .greeting h2 { font-size: 24px; }
  .drawer { max-width: 480px; left: 50%; transform: translateX(-50%) translateY(100%); }
  .drawer.open { transform: translateX(-50%) translateY(0); }
  .drawer-overlay { display: none; }
}


/* ── Aurora background ───────────────────────────── */
@property --a1{syntax:'<angle>';initial-value:0deg;inherits:false}
@property --a2{syntax:'<angle>';initial-value:60deg;inherits:false}
@property --a3{syntax:'<angle>';initial-value:120deg;inherits:false}

.aurora-bg {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
  background: #020510;
}

.aurora-layer {
  position: absolute; inset: 0;
  filter: blur(55px);
  opacity: 0.82;
  animation: auroraPulse 14s ease-in-out infinite alternate;
}
@keyframes auroraPulse {
  0%   { opacity: 0.7;  filter: blur(55px); }
  50%  { opacity: 0.92; filter: blur(45px); }
  100% { opacity: 0.72; filter: blur(65px); }
}

.aurora-band {
  position: absolute;
  width: 200%; left: -50%;
  border-radius: 50%;
  transform-origin: center center;
}

.ab1 {
  height: 80vh; top: -20vh;
  background: conic-gradient(from var(--a1) at 40% 60%,
    transparent 0%,
    rgba(0,255,200,0.5)  12%,
    rgba(0,170,255,0.4)  28%,
    transparent 42%,
    rgba(170,68,255,0.3) 58%,
    transparent 72%
  );
  animation: ab1spin 20s linear infinite;
}
@keyframes ab1spin { to { --a1: 360deg } }

.ab2 {
  height: 85vh; top: 0vh;
  background: conic-gradient(from var(--a2) at 62% 38%,
    transparent 0%,
    rgba(255,102,170,0.4) 10%,
    rgba(0,255,200,0.3)   26%,
    transparent 40%,
    rgba(0,170,255,0.5)   54%,
    transparent 68%
  );
  animation: ab2spin 28s linear infinite reverse;
}
@keyframes ab2spin { to { --a2: 420deg } }

.ab3 {
  height: 70vh; top: -5vh;
  background: conic-gradient(from var(--a3) at 28% 72%,
    transparent 0%,
    rgba(68,255,170,0.4)  18%,
    transparent 32%,
    rgba(255,102,170,0.3) 48%,
    rgba(170,68,255,0.4)  62%,
    transparent 78%
  );
  animation: ab3spin 22s linear infinite;
}
@keyframes ab3spin { to { --a3: 480deg } }

.museum-name {
  font-size: 10px;
  font-weight: 300;
  color: rgba(200,240,255,0.45);
  letter-spacing: 0.14em;
  font-family: 'Noto Serif TC', serif;
}
</style>
</head>
<body>

<!-- Aurora background -->
<div class="aurora-bg">
  <div class="aurora-layer">
    <div class="aurora-band ab1"></div>
    <div class="aurora-band ab2"></div>
    <div class="aurora-band ab3"></div>
  </div>
</div>

<!-- Orb glow ring -->
<div class="orb-glow-ring" id="orbGlowRing"></div>

<!-- Dot grid -->
<canvas id="dotCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;"></canvas>

<!-- Three.js canvas -->
<canvas id="threeCanvas"></canvas>

<div class="app">
  <div class="header">
    <div class="header-logo">
      <span class="museum-name">國立臺灣歷史博物館</span>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>線上服務中</span>
    </div>
  </div>

  <div class="greeting">
    <h2 id="greetingText">Gotour AI 智慧小助手</h2>
    <p id="greetingSubtext">可以跟我對話，或是往上滑也可以用打字的喔</p>
  </div>

  <div class="orb-spacer"></div>

  <div class="voice-label" id="voiceLabel"></div>

  <div class="bottom-bar">
    <button class="chat-tab-btn" id="chatTabBtn" onclick="openDrawer()">
      <div class="notif-dot"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>對話記錄</span>
    </button>
  </div>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-header">
    <div class="drawer-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      對話記錄
    </div>
    <button class="drawer-close-btn" onclick="closeDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="chip-row" id="chipRow">
    <button class="chip-btn" onclick="askChip(this)">幾點開館？</button>
    <button class="chip-btn" onclick="askChip(this)">票價多少？</button>
    <button class="chip-btn" onclick="askChip(this)">現在有哪些特展？</button>
    <button class="chip-btn" onclick="askChip(this)">怎麼搭公車來？</button>
    <button class="chip-btn" onclick="askChip(this)">可以帶寵物嗎？</button>
    <button class="chip-btn" onclick="askChip(this)">停車多少錢？</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="chat-empty" id="chatEmpty">
      <p>點球球說話<br>或在下方輸入問題</p>
    </div>
  </div>

  <div class="drawer-input-area">
    <div class="drawer-input-wrap">
      <textarea id="userInput" placeholder="輸入問題…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ═══════════════════════════════════════════════════
// INTERACTIVE DOT GRID
// ═══════════════════════════════════════════════════
(function() {
  const dc = document.getElementById('dotCanvas');
  const ctx = dc.getContext('2d');
  const DOT_SPACING = 20;
  const DOT_R = 0.7;
  const INFLUENCE = 80;
  const WHITE = [255, 255, 255];
  let mouse = { x: -999, y: -999 };
  let dots = [];
  let W, H;

  function resize() {
    W = dc.width = window.innerWidth;
    H = dc.height = window.innerHeight;
    dots = [];
    for (let x = DOT_SPACING; x < W; x += DOT_SPACING) {
      for (let y = DOT_SPACING; y < H; y += DOT_SPACING) {
        dots.push({ x, y, r: DOT_R, alpha: 0, targetAlpha: 0 });
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const now = Date.now() * 0.001;

    dots.forEach((d, i) => {
      const dx = d.x - mouse.x;
      const dy = d.y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < INFLUENCE) {
        const t = 1 - dist / INFLUENCE;
        d.targetAlpha = t * 0.55;
  
      } else {
        // Subtle idle twinkle
        d.targetAlpha = (Math.sin(now * 0.6 + d.x * 0.04 + d.y * 0.03) * 0.5 + 0.5) * 0.05;
  
      }

      // Smooth interpolation
      d.alpha += (d.targetAlpha - d.alpha) * 0.12;


      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);

      ctx.fillStyle = `rgba(255,255,255,${d.alpha})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('touchmove', e => {
    if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
  }, { passive: true });
  window.addEventListener('touchend', () => { mouse.x = -999; mouse.y = -999; });

  resize();
  draw();
})();

// ═══════════════════════════════════════════════════
// THREE.JS ORB  (from aguscruiz/voiceorb, adapted)
// ═══════════════════════════════════════════════════
let scene, camera, renderer, orbLayers = [];
let currentOrbState = 'idle';
let targetScale = 1.0, currentScale = 1.0;
let speakingCadence = { time:0, intensity:0, nextChange:0 };

const orbStates = {
  idle: {
    layers: [
      { color:0x00ffcc, opacity:0.45, scale:1.0,  rotationSpeed:{x:0.001,y:0.002,z:0} },
      { color:0x00aaff, opacity:0.45, scale:0.85, rotationSpeed:{x:-0.002,y:0.003,z:0.001} },
      { color:0xaa44ff, opacity:0.65, scale:0.70, rotationSpeed:{x:0.003,y:-0.002,z:-0.001} }
    ],
    audioLevel:0.15, timeSpeed:0.015, pulsate:false, chromaticAberration:1.8
  },
  listening: {
    layers: [
      { color:0x00ffcc, opacity:0.55, scale:1.0,  rotationSpeed:{x:0.002,y:0.004,z:0} },
      { color:0x44ffaa, opacity:0.55, scale:0.85, rotationSpeed:{x:-0.003,y:0.005,z:0.002} },

const vertexShader = `
  varying vec3 vNormal; varying vec3 vPosition; varying vec2 vUv;
  uniform float time; uniform float audioLevel; uniform float layerOffset;
  vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
  vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
  vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
  float snoise(vec3 v){
    const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);
    vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
    vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;
    vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
    vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
    i=mod289(i);
    vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
    float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
    vec4 j=p-49.*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);
    vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.-abs(x)-abs(y);
    vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
    vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));
    vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
    vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
    vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
    vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;
    return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }

    vUv=uv;vNormal=normalize(normalMatrix*normal);
    vec3 pos=position;
    float wave1=sin(pos.y*2.5+time*1.5+layerOffset)*cos(pos.x*2.-time*1.2);
    float wave2=sin(pos.x*3.-time*1.8+layerOffset)*cos(pos.z*2.5+time*1.5);
    float wave3=sin(pos.z*2.8+time*1.6+layerOffset)*cos(pos.y*2.3-time*1.3);
    float noise1=snoise(pos*1.2+time*0.3+layerOffset);

const fragmentShader = `
  varying vec3 vNormal; varying vec3 vPosition; varying vec2 vUv;
  uniform vec3 sphereColor; uniform float opacity; uniform float time; uniform float chromaticAberration;

  vec3 rgb2hsv(vec3 c){
    vec4 K=vec4(0.,-1./3.,2./3.,-1.);
    vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g));
    vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r));
    float d=q.x-min(q.w,q.y);float e=1.e-10;
    return vec3(abs(q.z+(q.w-q.y)/(6.*d+e)),d/(q.x+e),q.x);
  }
  vec3 hsv2rgb(vec3 c){
    vec4 K=vec4(1.,2./3.,1./3.,3.);
    vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);
    return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);
  }

  void main(){
    vec3 viewDir=normalize(cameraPosition-vPosition);
    vec3 norm=normalize(vNormal);
    float fresnel=pow(1.-abs(dot(viewDir,norm)),2.5);

    /* ── Rainbow holographic shift ── */
    float rainbowShift=norm.x*0.5+norm.y*0.2+norm.z*0.1;
    rainbowShift+=sin(vPosition.x*5.+time*0.5)*0.01+cos(vPosition.y*4.-time*0.3)*0.01;
    rainbowShift=fract(rainbowShift);
    vec3 rainbow=hsv2rgb(vec3(rainbowShift,0.9,1.2));

    /* ── Chromatic aberration ── */
    vec3 hsv=rgb2hsv(sphereColor);
    float ab=chromaticAberration*fresnel;
    vec3 hsvR=hsv; hsvR.x=fract(hsv.x+ab*0.18); vec3 cR=hsv2rgb(hsvR);
    vec3 hsvB=hsv; hsvB.x=fract(hsv.x-ab*0.18); vec3 cB=hsv2rgb(hsvB);
    vec3 color=vec3(cR.r, sphereColor.g, cB.b);

    /* ── Holographic blend ── */
    float holoI=fresnel*0.75+0.15;
    color=mix(color,rainbow,holoI*0.65);

    /* ── Glass: dark interior, bright edge glow ── */
    float edgeGlow=pow(fresnel, 1.2);
    float interior=1.-edgeGlow;

    /* Deep transparent interior */
    float glassAlpha=mix(opacity*0.55, opacity*1.0, edgeGlow);

    /* Edge color boost with aurora glow */
    color+=edgeGlow*chromaticAberration*0.25;
    color=mix(color*0.65, color*1.6, edgeGlow);

    /* ── Shimmer ── */
    float shimmer=sin(vPosition.x*8.+vPosition.y*6.+time*2.)*0.06+0.94;
    float pulse=1.+sin(time*1.2)*0.08;
    color*=shimmer*pulse;

    /* ── Inner specular highlight (glass reflection) ── */
    vec3 lightDir=normalize(vec3(0.5,0.8,1.0));
    float spec=pow(max(dot(reflect(-lightDir,norm),viewDir),0.),32.);
    color+=spec*0.7*vec3(0.8,1.0,1.0);

    gl_FragColor=vec4(color, glassAlpha);
  }
`;

function initOrb() {

  camera.position.z = 5;

  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const initialState = orbStates.idle;
  initialState.layers.forEach((lc, idx) => {
    const geo = new THREE.SphereGeometry(lc.scale, 80, 80);
    const mat = new THREE.ShaderMaterial({
      vertexShader, fragmentShader,
      uniforms: {
        time: { value: 0 },
        audioLevel: { value: 0 },
        layerOffset: { value: idx * 2.0 },
        sphereColor: { value: new THREE.Color(lc.color) },
        opacity: { value: lc.opacity },
        chromaticAberration: { value: initialState.chromaticAberration },
        cameraPosition: { value: camera.position }
      },
      transparent: true, side: THREE.DoubleSide,
      blending: THREE.NormalBlending, depthWrite: false
    });
    const sphere = new THREE.Mesh(geo, mat);
    sphere.userData = { baseScale: lc.scale, rotationSpeed: lc.rotationSpeed };
    scene.add(sphere);
    orbLayers.push(sphere);
  });

  scene.add(new THREE.AmbientLight(0xffffff, 0.2));
  const pl1 = new THREE.PointLight(0x00ffcc, 1.8, 80);
  pl1.position.set(4, 4, 6); scene.add(pl1);
  const pl2 = new THREE.PointLight(0xaa44ff, 1.4, 80);

  pl3.position.set(0, -5, 4); scene.add(pl3);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);

function updateSpeakingCadence() {
  const now = Date.now() * 0.001;
  if (now >= speakingCadence.nextChange) {
    const t = Math.random();
    if (t < 0.3) { speakingCadence.intensity = 0.7 + Math.random() * 0.3; speakingCadence.nextChange = now + 0.15 + Math.random() * 0.15; }
    else if (t < 0.6) { speakingCadence.intensity = 0.5 + Math.random() * 0.4; speakingCadence.nextChange = now + 0.3 + Math.random() * 0.3; }
    else if (t < 0.85) { speakingCadence.intensity = 0.6 + Math.random() * 0.4; speakingCadence.nextChange = now + 0.5 + Math.random() * 0.4; }
    else { speakingCadence.intensity = 0.1 + Math.random() * 0.2; speakingCadence.nextChange = now + 0.2 + Math.random() * 0.3; }
  }
  return Math.max(0, speakingCadence.intensity + Math.sin(Date.now() * 0.001 * 10) * 0.08);
}

function animateOrb() {
  requestAnimationFrame(animateOrb);
  const state = orbStates[currentOrbState];

  if (state.pulsate) {
    if (state.pulsateMode === 'thinking') {
      const p = (Math.sin(Date.now() * 0.001 * 1.5) + 1) / 2;
      targetScale = 1 + state.pulsateMin + p * (state.pulsateMax - state.pulsateMin);
    } else if (state.pulsateMode === 'cadence' || state.pulsateMode === 'audio-reactive') {
      const c = updateSpeakingCadence();
      targetScale = 1 + state.pulsateMin + c * (state.pulsateMax - state.pulsateMin);
    }
    currentScale += (targetScale - currentScale) * 0.15;
  } else {
    currentScale += (1.0 - currentScale) * 0.1;
  }

  orbLayers.forEach((layer, idx) => {
    const lc = state.layers[idx];
    if (!lc) return;
    layer.material.uniforms.time.value += state.timeSpeed;
    layer.material.uniforms.audioLevel.value = state.audioLevel;
    layer.rotation.x += layer.userData.rotationSpeed.x;
    layer.rotation.y += layer.userData.rotationSpeed.y;
    layer.rotation.z += layer.userData.rotationSpeed.z;
    const s = layer.userData.baseScale * currentScale;
    layer.scale.set(s, s, s);
  });

  renderer.render(scene, camera);
}

// DOM refs
const voiceLabel = document.getElementById('voiceLabel');
const greetingText = document.getElementById('greetingText');
const greetingSubtext = document.getElementById('greetingSubtext');
const chatArea = document.getElementById('chatArea');
const sendBtn = document.getElementById('sendBtn');
const userInput = document.getElementById('userInput');
const chatTabBtn = document.getElementById('chatTabBtn');
const chipRow = document.getElementById('chipRow');

function setVoiceLabel(t) { voiceLabel.textContent = t; voiceLabel.style.opacity = t ? '1' : '0'; }

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 100);
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

// Swipe down to close
let touchStartY = 0;
document.getElementById('drawer').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
document.getElementById('drawer').addEventListener('touchend', e => { if (e.changedTouches[0].clientY - touchStartY > 60) closeDrawer(); }, {passive:true});

function appendMsg(text, role, isError=false) {
  document.getElementById('chatEmpty')?.remove();
  if (!hasMessages && role==='user') {
    hasMessages = true;
    chatTabBtn.classList.add('has-messages');
    chipRow.style.display = 'none';
  }
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role==='bot' ? '史' : '我';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}${isError?' error':''}`;
  bubble.style.whiteSpace = 'pre-line';
  bubble.textContent = text;
  div.appendChild(av); div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className='typing'; div.id='typingIndicator';
  const av = document.createElement('div');
  av.className='avatar bot'; av.textContent='史';
  const dots = document.createElement('div');
  dots.className='typing-dots';
  dots.innerHTML='<span></span><span></span><span></span>';
  div.appendChild(av); div.appendChild(dots);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function hideTyping() { document.getElementById('typingIndicator')?.remove(); }

async function callGemini(userMessage) {
  conversationHistory.push({role:'user',parts:[{text:userMessage}]});
  const res = await fetch(`${WORKER}/gemini`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      system_instruction:{parts:[{text:SYSTEM_PROMPT}]},
      contents: conversationHistory,
      generationConfig:{maxOutputTokens:600,temperature:0.3}
    })
  });
  if (!res.ok) throw new Error(`${res.status}`);
  const data = await res.json();
  const reply = data.candidates[0].content.parts[0].text;
  conversationHistory.push({role:'model',parts:[{text:reply}]});
  return reply;
}

async function speakText(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  setOrbState('speaking');
  setVoiceLabel('說話中…');
  try {
    const res = await fetch(`${WORKER}/tts`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    if (!res.ok) throw new Error('TTS failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.playsInline = true;
    currentAudio.onended = () => { setOrbState('idle'); setVoiceLabel(''); greetingText.textContent = 'Gotour AI 智慧小助手'; greetingSubtext.textContent = '可以跟我對話，或是往上滑也可以用打字的喔'; };
    currentAudio.onerror = () => { setOrbState('idle'); setVoiceLabel(''); };
    const p = currentAudio.play();
    if (p !== undefined) {
      p.catch(() => {
        setOrbState('idle');
        setVoiceLabel('點球球聽回答');
        pendingSpeech = url;
      });
    }
  } catch(e) { setOrbState('idle'); setVoiceLabel(''); }
}

async function toggleRecording() {
  await unlockAudio();

  // iOS pending speech
  if (pendingSpeech) {
    const url = pendingSpeech; pendingSpeech = null;
    setVoiceLabel('');
    currentAudio = new Audio(url);
    currentAudio.playsInline = true;
    setOrbState('speaking');
    currentAudio.onended = () => { setOrbState('idle'); setVoiceLabel(''); };
    currentAudio.play().catch(()=>{});
    return;
  }

  if (isLoading) return;

  if (isRecording) {
    mediaRecorder?.state === 'recording' && mediaRecorder.stop();
    return;
  }

  isRecording = true;
  setOrbState('listening');
  setVoiceLabel('聆聽中… 再點停止');
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const chunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t=>t.stop());
      isRecording = false;
      setOrbState('thinking');
      setVoiceLabel('辨識中…');
      try {
        const wavBlob = await convertToWav(new Blob(chunks,{type:'audio/webm'}));
        const res = await fetch(`${WORKER}/stt`, {
          method:'POST', headers:{'Content-Type':'audio/wav'}, body:wavBlob
        });
        const data = await res.json();
        const text = data.DisplayText || '';
        setVoiceLabel('');
        if (text) {
          sendMessage(text);
        } else {
          setOrbState('idle');
          setVoiceLabel('未偵測到語音');
          setTimeout(()=>setVoiceLabel(''), 2000);
        }
      } catch { setOrbState('idle'); setVoiceLabel('辨識失敗，請再試'); setTimeout(()=>setVoiceLabel(''),2500); }
    };
    mediaRecorder.start();
    setTimeout(() => mediaRecorder?.state==='recording' && mediaRecorder.stop(), 10000);
  } catch {
    isRecording = false; setOrbState('idle');
    setVoiceLabel('無法存取麥克風'); setTimeout(()=>setVoiceLabel(''),2500);
  }
}

async function convertToWav(blob) {
  const ctx = new AudioContext({sampleRate:16000});
  const audio = await ctx.decodeAudioData(await blob.arrayBuffer());
  const pcm = audio.getChannelData(0);
  return new Blob([pcmToWav(pcm,16000)],{type:'audio/wav'});
}
function pcmToWav(pcm,sr) {
  const buf = new ArrayBuffer(44+pcm.length*2);
  const v = new DataView(buf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+pcm.length*2,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,pcm.length*2,true);
  for(let i=0;i<pcm.length;i++)v.setInt16(44+i*2,Math.max(-1,Math.min(1,pcm[i]))*0x7FFF,true);
  return buf;
}

async function sendMessage(text) {
  const q = text || userInput.value.trim();
  if (!q || isLoading) return;
  appendMsg(q,'user');
  userInput.value=''; autoResize(userInput);
  isLoading=true; sendBtn.disabled=true;
  showTyping();
  setOrbState('thinking');
  greetingText.textContent='思考中…';
  greetingSubtext.textContent='';

  try {
    const reply = await callGemini(q);
    hideTyping();
    appendMsg(reply,'bot');
    greetingText.textContent='回答完成';
    greetingSubtext.textContent='點球球繼續說話';
    speakText(reply);
  } catch(err) {
    hideTyping();
    appendMsg('連線失敗，請稍後再試，或洽服務台 06-356-8889。','bot',true);
    conversationHistory.pop();
    setOrbState('idle');
    greetingText.textContent='你好，我是臺史博助理';
    greetingSubtext.textContent='點球球說話，或向上滑動查看對話';
  }
  isLoading=false; sendBtn.disabled=false;
}

function askChip(btn) { sendMessage(btn.textContent); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }

// Init
window.addEventListener('DOMContentLoaded', initOrb);
</script>
